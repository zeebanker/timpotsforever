<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Guided Tour — Timpots Forever</title>
<meta name="description" content="A narrated 4-minute walk through what's on the Timpots Forever alumni site — section by section.">
<meta property="og:title" content="A Guided Tour — Timpots Forever">
<meta property="og:description" content="A 4-minute narrated tour of the Timpots Forever alumni site.">
<meta property="og:image" content="https://timpotsforever.org/images/tour/jazz.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500;1,700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #7a1420;
    --brand-dark: #4a0810;
    --ink: #1a1a1a;
    --gold: #b5894a;
    --gold-bright: #f0c579;
    --bg-soft: #f7f4ee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    color: #fff;
    background: #120406;
    min-height: 100vh;
    overflow: hidden;
  }
  a { color: var(--gold-bright); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── Stage layout ───────────────────────────────────────── */
  .tour-app {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-rows: auto 1fr auto auto;
  }

  /* ── HEADER: brand + nav bar ────────────────────────────── */
  .tour-header {
    background: rgba(0,0,0,0.35);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 12px 24px 0;
  }
  .tour-header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .brand-mark {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 500;
    color: #fff;
    white-space: nowrap;
  }
  .brand-mark em { color: var(--gold); font-style: italic; }
  .brand-sep {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-left: 14px;
  }
  .header-actions {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.25);
    color: rgba(255,255,255,0.85);
    font-family: inherit;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 6px 14px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }
  .header-btn:hover { background: rgba(255,255,255,0.1); text-decoration: none; }

  /* Nav bar */
  .tour-nav {
    position: relative;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
    padding-bottom: 6px;
  }
  .tour-nav-item {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    padding: 8px 10px 10px;
    position: relative;
    transition: color 0.3s;
    cursor: default;
    white-space: nowrap;
  }
  .tour-nav-item.dimmed { color: rgba(255,255,255,0.25); }
  .tour-nav-item.active {
    color: var(--gold-bright);
  }
  .tour-nav-item.active::after {
    content: "";
    position: absolute;
    left: 10px;
    right: 10px;
    bottom: 0;
    height: 2px;
    background: var(--gold);
    box-shadow: 0 0 12px rgba(240, 197, 121, 0.6);
  }
  .tour-nav-item.visited { color: rgba(255,255,255,0.7); }

  /* ── MAIN: image stage with overlays ─────────────────────── */
  .stage {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px 24px;
    overflow: hidden;
    min-height: 0;
  }
  .frame {
    position: relative;
    max-width: 1180px;
    width: 100%;
    aspect-ratio: 16 / 10;
    max-height: 100%;
    background: var(--bg-soft);
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    overflow: hidden;
    transition: opacity 0.4s;
  }
  .frame.transitioning { opacity: 0; }
  .frame img.page-image {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    object-position: top center;
  }

  /* Title-card mode (slide 1 / closer) */
  .title-card {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    text-align: center;
  }
  .title-card .tc-brand {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    font-weight: 500;
    color: #fff;
    line-height: 1.05;
    margin-bottom: 14px;
  }
  .title-card .tc-brand em { color: var(--gold-bright); font-style: italic; }
  .title-card .tc-sub {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
  }
  .title-card.end-card .tc-sub {
    margin-bottom: 36px;
  }
  .title-card .end-actions {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 14px;
  }
  .title-card .end-btn {
    background: var(--gold);
    color: var(--brand-dark);
    border: none;
    padding: 12px 26px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }
  .title-card .end-btn:hover { background: var(--gold-bright); text-decoration: none; }
  .title-card .end-btn.outline {
    background: none;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.5);
  }
  .title-card .end-btn.outline:hover { background: rgba(255,255,255,0.12); }

  /* Overlay layer (pointer, dots, CTA ring) */
  .overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* Pointer — garnet arrow with subtle glow */
  .pointer {
    position: absolute;
    width: 38px;
    height: 38px;
    transform: translate(-8px, -4px);
    transition: left 0.9s cubic-bezier(.4, .1, .25, 1), top 0.9s cubic-bezier(.4, .1, .25, 1), opacity 0.3s;
    opacity: 0;
    z-index: 10;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.45));
  }
  .pointer.show { opacity: 1; }
  .pointer svg { width: 100%; height: 100%; display: block; }
  .pointer-ring {
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background: rgba(122, 20, 32, 0);
    transform: scale(0.4);
    animation: pointer-tap 1.4s ease-out;
    animation-iteration-count: 2;
    pointer-events: none;
  }
  @keyframes pointer-tap {
    0%   { background: rgba(240, 197, 121, 0.6); transform: scale(0.4); }
    100% { background: rgba(240, 197, 121, 0);   transform: scale(2.4); }
  }

  /* Numbered dots */
  .dot {
    position: absolute;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--brand-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 13px;
    font-weight: 700;
    transform: translate(-13px, -13px) scale(0);
    transition: transform 0.4s cubic-bezier(.34, 1.56, .64, 1);
    box-shadow: 0 4px 14px rgba(0,0,0,0.45);
    z-index: 8;
  }
  .dot::before {
    content: "";
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 2px solid rgba(240, 197, 121, 0.6);
    animation: dot-halo 2.2s ease-out infinite;
  }
  @keyframes dot-halo {
    0%   { transform: scale(1);    opacity: 0.8; }
    100% { transform: scale(1.7);  opacity: 0; }
  }
  .dot.show { transform: translate(-13px, -13px) scale(1); }

  /* CTA pulse-ring */
  .cta-ring {
    position: absolute;
    border: 2px solid var(--gold-bright);
    background: rgba(240, 197, 121, 0.08);
    border-radius: 6px;
    box-shadow: 0 0 0 3px rgba(240, 197, 121, 0.15);
    opacity: 0;
    transform: scale(0.92);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 9;
  }
  .cta-ring.show {
    opacity: 1;
    transform: scale(1);
    animation: cta-pulse 1.8s ease-out infinite;
  }
  @keyframes cta-pulse {
    0%   { box-shadow: 0 0 0 3px rgba(240, 197, 121, 0.5); }
    100% { box-shadow: 0 0 0 18px rgba(240, 197, 121, 0); }
  }
  .cta-label {
    position: absolute;
    top: -34px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: var(--brand-dark);
    padding: 5px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    white-space: nowrap;
    border-radius: 3px;
  }
  .cta-label::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: -5px;
    transform: translateX(-50%) rotate(45deg);
    width: 8px;
    height: 8px;
    background: var(--gold);
  }

  /* ── Caption strip ──────────────────────────────────────── */
  .caption-strip {
    padding: 14px 24px 12px;
    text-align: center;
    background: rgba(0,0,0,0.25);
  }
  .caption-eyebrow {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .caption-text {
    font-size: 15px;
    line-height: 1.55;
    color: rgba(255,255,255,0.85);
    max-width: 920px;
    margin: 0 auto;
  }
  .caption-text em { color: var(--gold-bright); font-style: italic; }

  /* ── Controls ───────────────────────────────────────────── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 12px 24px 16px;
    background: rgba(0,0,0,0.35);
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .ctrl {
    background: none;
    border: 1px solid rgba(255,255,255,0.22);
    color: #fff;
    padding: 8px 11px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.4); }
  .ctrl:disabled { opacity: 0.32; cursor: not-allowed; }
  .ctrl svg { display: block; }
  .ctrl.play-pause { min-width: 42px; }
  .slide-counter {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.08em;
    padding: 0 12px;
    font-variant-numeric: tabular-nums;
  }

  /* ── Progress strip (under header) ──────────────────────── */
  .progress-strip {
    height: 3px;
    background: rgba(255,255,255,0.08);
    position: relative;
    overflow: hidden;
  }
  .progress-fill {
    position: absolute;
    inset: 0;
    background: var(--gold-bright);
    transform-origin: left;
    transform: scaleX(0);
    transition: transform 0.2s linear;
  }

  /* ── Start gate (gesture-required for TTS) ──────────────── */
  .start-gate {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
    transition: opacity 0.4s;
  }
  .start-gate.hide { opacity: 0; pointer-events: none; }
  .start-gate h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 500;
    color: #fff;
    line-height: 1.1;
    margin-bottom: 12px;
  }
  .start-gate h1 em { color: var(--gold-bright); font-style: italic; }
  .start-gate .start-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
  }
  .start-gate p {
    font-size: 16px;
    line-height: 1.55;
    color: rgba(255,255,255,0.82);
    max-width: 540px;
    margin: 0 auto 28px;
  }
  .start-gate .start-btn {
    background: var(--gold);
    color: var(--brand-dark);
    border: none;
    padding: 14px 36px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
  }
  .start-gate .start-btn:hover { background: var(--gold-bright); transform: translateY(-1px); }
  .start-gate .start-hint {
    margin-top: 18px;
    font-size: 12px;
    color: rgba(255,255,255,0.5);
  }
  .start-gate .start-hint button {
    background: none;
    border: 0;
    color: inherit;
    text-decoration: underline;
    cursor: pointer;
    font: inherit;
  }
  .start-gate .start-hint button:hover { color: rgba(255,255,255,0.85); }

  /* ── Responsive ─────────────────────────────────────────── */
  @media (max-width: 900px) {
    .tour-header { padding: 10px 14px 0; }
    .brand-sep { display: none; }
    .tour-nav-item { font-size: 10px; padding: 6px 7px 8px; letter-spacing: 0.1em; }
    .tour-nav-item.active::after { left: 7px; right: 7px; }
    .stage { padding: 12px 14px; }
    .caption-strip { padding: 10px 16px; }
    .caption-text { font-size: 14px; }
    .title-card .tc-brand { font-size: 40px; }
    .start-gate h1 { font-size: 32px; }
    .start-gate p { font-size: 14px; }
    .pointer { width: 30px; height: 30px; }
    .dot { width: 22px; height: 22px; font-size: 11px; }
    .controls { padding: 10px 14px 14px; gap: 8px; }
    .ctrl { padding: 7px 10px; }
  }
  @media (max-width: 540px) {
    .tour-nav { gap: 0; }
    .tour-nav-item { font-size: 9px; padding: 5px 5px 6px; }
    .tour-nav-item.active::after { left: 5px; right: 5px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .pointer { transition: opacity 0.2s; }
    .dot { transition: opacity 0.2s; }
    .dot::before { animation: none; }
    .cta-ring.show { animation: none; }
    .frame { transition: none; }
  }
</style>
</head>
<body>

<div class="tour-app">

  <!-- HEADER -->
  <div class="tour-header">
    <div class="tour-header-top">
      <div>
        <span class="brand-mark">Timpots <em>Forever</em></span>
        <span class="brand-sep">A Guided Tour</span>
      </div>
      <div class="header-actions">
        <button class="header-btn" id="mute-btn" type="button">🔊 Sound on</button>
        <a class="header-btn" href="index.html">Skip ✕</a>
      </div>
    </div>
    <nav class="tour-nav" id="tour-nav" aria-label="Site sections covered in the tour"></nav>
  </div>

  <!-- Progress strip -->
  <div class="progress-strip"><div class="progress-fill" id="progress-fill"></div></div>

  <!-- MAIN stage -->
  <div class="stage">
    <div class="frame" id="frame">
      <img class="page-image" id="page-image" alt="" src="" hidden>
      <div class="title-card" id="title-card" hidden>
        <div class="tc-sub" id="tc-sub">Welcome</div>
        <div class="tc-brand" id="tc-brand">Timpots <em>Forever</em></div>
        <div class="end-actions" id="end-actions" hidden>
          <a class="end-btn" href="login.html">Sign up free</a>
          <button class="end-btn outline" type="button" id="replay-btn">Replay tour</button>
        </div>
      </div>
      <div class="overlay" id="overlay"></div>
    </div>
  </div>

  <!-- Caption strip -->
  <div class="caption-strip">
    <div class="caption-eyebrow" id="caption-eyebrow">Welcome</div>
    <p class="caption-text" id="caption-text"></p>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl" id="prev-btn" type="button" aria-label="Previous slide" title="Previous">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="ctrl play-pause" id="play-pause-btn" type="button" aria-label="Pause" title="Pause">
      <svg id="icon-pause" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
      <svg id="icon-play" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="display:none;"><polygon points="6 4 20 12 6 20 6 4"/></svg>
    </button>
    <button class="ctrl" id="next-btn" type="button" aria-label="Next slide" title="Next">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="slide-counter" id="slide-counter">1 / 10</div>
  </div>
</div>

<!-- Start gate (until user clicks Start, no audio plays) -->
<div class="start-gate" id="start-gate">
  <div class="start-eyebrow">A 4-minute walk-through</div>
  <h1>Welcome to <em>Timpots Forever</em></h1>
  <p>A narrated tour of what's on the site — section by section. Sound recommended. You can pause, replay, or skip at any time.</p>
  <button class="start-btn" id="start-btn" type="button">Start tour ▸</button>
  <div class="start-hint">
    No audio? <button type="button" id="start-muted">Watch silently with captions</button>
  </div>
</div>

<script>
  // ════════════════════════════════════════════════════════════
  //  TOUR DATA — narration, pointer waypoints, dots, CTA
  // ════════════════════════════════════════════════════════════

  // Nav items in display order. `key` is the slide id that activates the
  // nav highlight; null means dimmed/not covered in the tour.
  const NAV_ITEMS = [
    { label: 'Jazz',              key: 'jazz' },
    { label: 'Newsletter',        key: null  },
    { label: 'Memory Lane',       key: 'memory-lane' },
    { label: 'School History',    key: 'school-history' },
    { label: 'Famous Timpots',    key: 'famous-timpots' },
    { label: 'Timpots Worldwide', key: 'map' },
    { label: 'Alumni Directory',  key: 'directory' },
    { label: 'Giving Back',       key: 'giving-back' },
    { label: 'Videos/Photos',     key: null  },
    { label: 'Calendar',          key: 'calendar' }
  ];

  // Each slide: eyebrow, navKey (which nav item to highlight), image,
  // narration text, pointer waypoints (normalized 0..1, x/y over image),
  // dots (normalized, with optional label), CTA (normalized rect + label).
  // Narration is the source of truth — edit it freely. TTS speaks it.
  const SLIDES = [
    {
      id: 'welcome',
      eyebrow: 'Welcome',
      navKey: null,
      titleCard: { sub: 'A guided tour', brand: 'Timpots <em>Forever</em>' },
      narration: "Welcome to Timpots Forever — a community space for everyone who passed through Timpany School, Visakhapatnam. Whether you graduated decades ago or you're still in touch with your batch, this is home. Built by alumni, for alumni, in memory of our beloved Jazz. Let me show you what's here.",
      pointer: 'nav-sweep',
      dots: [],
      cta: null
    },
    {
      id: 'jazz',
      eyebrow: 'Jazz',
      navKey: 'jazz',
      image: 'images/tour/jazz.png',
      narration: "Click Jazz for the heart of the site — our tribute to Doctor Mercy Jeyaraja Rao. You'll find her photograph, her memorial dates, the tribute video, and the gallery of photographs we've gathered. This is where we remember the headmistress who shaped us.",
      pointer: [
        { t: 0.15, x: 0.18, y: 0.20 },   // portrait
        { t: 0.55, x: 0.55, y: 0.15 }    // name + 'Jazz' title
      ],
      dots: [
        { x: 0.18, y: 0.34, label: '1' } // dates
      ],
      cta: null
    },
    {
      id: 'memory-lane',
      eyebrow: 'Memory Lane',
      navKey: 'memory-lane',
      image: 'images/tour/memory-lane.png',
      narration: "Memory Lane is where forty alumni share what stayed with them — first days, walking with Jazz, the teachers we remember, the songs, the mischief, the haunts. Drawn verbatim from the Timpots Forever group chat. Pick a theme, read a few, then send us yours.",
      pointer: [
        { t: 0.20, x: 0.50, y: 0.32 },   // theme nav row
        { t: 0.65, x: 0.50, y: 0.78 }    // first quote box
      ],
      dots: [
        { x: 0.62, y: 0.92, label: '1' } // attribution under quote
      ],
      cta: null
    },
    {
      id: 'school-history',
      eyebrow: 'School History',
      navKey: 'school-history',
      image: 'images/tour/school-history.png',
      narration: "School History takes you from 1931 to today. The founding by Reverend Timpany, Jazz's stewardship from 1954, the campuses, the four houses, the crest, the school song. Scroll down for the A-to-Z directory of the teachers we still remember.",
      pointer: [
        { t: 0.20, x: 0.27, y: 0.65 },   // 1931 milestone
        { t: 0.55, x: 0.27, y: 0.81 }    // 1954 milestone
      ],
      dots: [
        { x: 0.50, y: 0.48, label: '1' } // "Key Milestones" heading
      ],
      cta: null
    },
    {
      id: 'famous-timpots',
      eyebrow: 'Famous Timpots',
      navKey: 'famous-timpots',
      image: 'images/tour/famous-timpots.png',
      narration: "Famous Timpots celebrates alumni who've left their mark — in uniform, in laboratories, on stages, in boardrooms. A growing list across six continents. If you know someone missing, email us and we'll add them.",
      pointer: [

      ],

      ],

    },
    {
      id: 'giving-back',
      eyebrow: 'Giving Back',
      navKey: 'giving-back',
      image: 'images/tour/giving-back.png',
      narration: "Giving Back is where we share the causes Timpots are quietly supporting — and where you can suggest one you believe in. The featured cause shown today is a placeholder; real submissions go straight to the team.",
      pointer: [
        { t: 0.25, x: 0.25, y: 0.66 },   // Featured Cause heading
        { t: 0.60, x: 0.50, y: 0.58 }    // SAMPLE banner
      ],
      dots: [
        { x: 0.50, y: 0.27, label: '1' } // intro paragraph
      ],
      cta: { x: 0.22, y: 0.58, w: 0.57, h: 0.04, label: 'Mock cause' }
    },
    {
      id: 'calendar',
      eyebrow: 'Calendar',
      navKey: 'calendar',
      image: 'images/tour/calendar.png',
      narration: "The Calendar lists every Timpots Forever event — casual monthly meetups in Vizag every second Sunday, and the inaugural Jeyaraja Rao Memorial Debate Competition on July 4th, 2026. Sign in to see venues and RSVP details.",
      pointer: [
        { t: 0.20, x: 0.25, y: 0.59 },   // Jun 14 monthly meetup
        { t: 0.55, x: 0.30, y: 0.85 }    // Jul 4 debate card
      ],
      dots: [
        { x: 0.74, y: 0.83, label: '1' } // INAUGURAL tag
      ],
      cta: { x: 0.55, y: 0.36, w: 0.07, h: 0.04, label: 'Sign in' }
    },
    {
      id: 'closer',
      eyebrow: 'Welcome home',
      navKey: null,
      titleCard: {
        sub: 'You made it to the end',
        brand: 'Welcome <em>home</em>, Timpot.',
        end: true
      },
      narration: "That's the tour. To put yourself on the map and into the directory, sign up free — just an email and a password. Then add your batch year, house, city, and a short bio. Welcome home, Timpot.",
      pointer: null,
      dots: [],
      cta: null
    }
  ];

  // ════════════════════════════════════════════════════════════
  //  STATE & DOM
  // ════════════════════════════════════════════════════════════
  const frame       = document.getElementById('frame');
  const pageImage   = document.getElementById('page-image');
  const titleCard   = document.getElementById('title-card');
  const tcBrand     = document.getElementById('tc-brand');
  const tcSub       = document.getElementById('tc-sub');
  const endActions  = document.getElementById('end-actions');
  const overlay     = document.getElementById('overlay');
  const captionEye  = document.getElementById('caption-eyebrow');
  const captionText = document.getElementById('caption-text');
  const counterEl   = document.getElementById('slide-counter');
  const progressEl  = document.getElementById('progress-fill');
  const tourNavEl   = document.getElementById('tour-nav');
  const muteBtn     = document.getElementById('mute-btn');
  const startGate   = document.getElementById('start-gate');

  let currentIdx     = 0;
  let isPlaying      = true;
  let isMuted        = false;
  let currentUtter   = null;
  let pointerTimers  = [];
  let progressTimer  = null;
  let advanceTimer   = null;
  let estimateMs     = 0;
  let pickedVoice    = null;

  // ════════════════════════════════════════════════════════════
  //  NAV BAR — render once, highlight active item
  // ════════════════════════════════════════════════════════════
  function renderNav() {
    tourNavEl.innerHTML = '';
    NAV_ITEMS.forEach(item => {
      const el = document.createElement('span');
      el.className = 'tour-nav-item' + (item.key === null ? ' dimmed' : '');
      el.dataset.key = item.key || '';
      el.textContent = item.label;
      tourNavEl.appendChild(el);
    });
  }

  function updateNavHighlight(navKey, visitedKeys) {
    document.querySelectorAll('.tour-nav-item').forEach(el => {
      el.classList.remove('active', 'visited');
      const k = el.dataset.key;
      if (k && navKey === k) el.classList.add('active');
      else if (k && visitedKeys.has(k)) el.classList.add('visited');
    });
  }

  // ════════════════════════════════════════════════════════════
  //  TTS — voice selection + speak helper
  // ════════════════════════════════════════════════════════════
  function pickVoice() {
    if (!('speechSynthesis' in window)) return null;
    const voices = speechSynthesis.getVoices();
    if (!voices.length) return null;
    // Prefer Indian/UK/US English, female if possible
    const langPrefs = ['en-IN', 'en-GB', 'en-AU', 'en-US'];
    for (const lang of langPrefs) {
      const v = voices.find(v => (v.lang === lang || v.lang.toLowerCase().startsWith(lang.toLowerCase())) && /female|samantha|karen|moira|tessa|veena|rishi/i.test(v.name));
      if (v) return v;
    }
    for (const lang of langPrefs) {
      const v = voices.find(v => v.lang === lang || v.lang.toLowerCase().startsWith(lang.toLowerCase()));
      if (v) return v;
    }
    return voices[0];
  }

  function speak(text, onEnd) {
    if (!('speechSynthesis' in window) || isMuted) {
      // No TTS or muted — use estimated duration timer
      const words = text.trim().split(/\s+/).length;
      const ms = Math.max(8000, words * 360);
      advanceTimer = setTimeout(onEnd, ms);
      estimateMs = ms;
      return;
    }
    try { speechSynthesis.cancel(); } catch (e) {}
    const u = new SpeechSynthesisUtterance(text);
    if (pickedVoice) u.voice = pickedVoice;
    u.rate = 0.96;
    u.pitch = 1.0;
    u.volume = 1.0;
    u.onend = () => { if (currentUtter === u) onEnd(); };
    u.onerror = () => { if (currentUtter === u) onEnd(); };
    currentUtter = u;
    // Best-effort duration estimate (drives pointer/progress animation)
    const words = text.trim().split(/\s+/).length;
    estimateMs = Math.max(8000, words * 380);
    speechSynthesis.speak(u);
  }

  function stopSpeaking() {
    try { speechSynthesis.cancel(); } catch (e) {}
    currentUtter = null;
    clearTimeout(advanceTimer);
    advanceTimer = null;
  }

  // ════════════════════════════════════════════════════════════
  //  OVERLAY — pointer, dots, CTA
  // ════════════════════════════════════════════════════════════
  function clearOverlay() {
    pointerTimers.forEach(t => clearTimeout(t));
    pointerTimers = [];
    overlay.innerHTML = '';
  }

  function buildPointer(target) {
    const p = document.createElement('div');
    p.className = 'pointer';
    p.id = 'pointer';
    p.innerHTML = `
      <svg viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="ptr-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f0c579"/>
            <stop offset="100%" stop-color="#7a1420"/>
          </linearGradient>
        </defs>
        <path d="M3 2 L3 22 L10 17 L14 26 L18 24 L14 15 L22 13 Z"
              fill="url(#ptr-grad)" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
      <div class="pointer-ring"></div>
    `;
    overlay.appendChild(p);
    // Place at initial position before fade-in so transition only animates moves
    setNormalizedPos(p, target.x, target.y);
    requestAnimationFrame(() => p.classList.add('show'));
    return p;
  }

  function movePointerTo(p, x, y) {
    setNormalizedPos(p, x, y);
    // Add a tap-ring effect
    const old = p.querySelector('.pointer-ring');
    if (old) old.remove();
    const ring = document.createElement('div');
    ring.className = 'pointer-ring';
    p.appendChild(ring);
  }

  function setNormalizedPos(el, x, y) {
    const rect = frame.getBoundingClientRect();
    el.style.left = (x * rect.width)  + 'px';
    el.style.top  = (y * rect.height) + 'px';
  }

  function buildDots(dots) {
    dots.forEach((d, i) => {
      const el = document.createElement('div');
      el.className = 'dot';
      el.textContent = d.label || String(i + 1);
      overlay.appendChild(el);
      setNormalizedPos(el, d.x, d.y);
      // Stagger fade-in slightly
      pointerTimers.push(setTimeout(() => el.classList.add('show'), 400 + i * 220));
    });
  }

  function buildCta(cta) {
    if (!cta) return;
    const el = document.createElement('div');
    el.className = 'cta-ring';
    el.innerHTML = `<div class="cta-label">${cta.label}</div>`;
    overlay.appendChild(el);
    const rect = frame.getBoundingClientRect();
    el.style.left   = (cta.x * rect.width)  + 'px';
    el.style.top    = (cta.y * rect.height) + 'px';
    el.style.width  = (cta.w * rect.width)  + 'px';
    el.style.height = (cta.h * rect.height) + 'px';
    // Show near the end of narration (~80%)
    pointerTimers.push(setTimeout(() => el.classList.add('show'), Math.max(estimateMs * 0.78, 4000)));
  }

  // Special "nav-sweep" pointer for slide 1 — moves the pointer across
  // the nav items in the header in sequence.
  function navSweep() {
    const items = Array.from(document.querySelectorAll('.tour-nav-item'));
    if (!items.length) return;
    // Create a pointer at the FIRST nav item
    const ptr = document.createElement('div');
    ptr.className = 'pointer';
    ptr.id = 'pointer-sweep';
    ptr.style.position = 'fixed';
    ptr.style.zIndex = 50;
    ptr.innerHTML = `
      <svg viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="ptr-grad-h" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#f0c579"/>
            <stop offset="100%" stop-color="#7a1420"/>
          </linearGradient>
        </defs>
        <path d="M3 2 L3 22 L10 17 L14 26 L18 24 L14 15 L22 13 Z"
              fill="url(#ptr-grad-h)" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
      <div class="pointer-ring"></div>
    `;
    document.body.appendChild(ptr);
    function moveTo(el) {
      const r = el.getBoundingClientRect();
      ptr.style.left = (r.left + r.width  * 0.5 - 8) + 'px';
      ptr.style.top  = (r.top  + r.height * 0.7) + 'px';
    }
    moveTo(items[0]);
    requestAnimationFrame(() => ptr.classList.add('show'));
    const visibleItems = items.filter(i => !i.classList.contains('dimmed'));
    const step = Math.max(1200, estimateMs / visibleItems.length);
    visibleItems.forEach((item, i) => {
      pointerTimers.push(setTimeout(() => moveTo(item), i * step));
    });
    // Clean up at end of slide
    pointerTimers.push(setTimeout(() => ptr.remove(), estimateMs + 600));
  }

  // ════════════════════════════════════════════════════════════
  //  SLIDE RENDER
  // ════════════════════════════════════════════════════════════
  function renderSlide(idx, opts) {
    opts = opts || {};
    clearOverlay();
    stopSpeaking();
    cancelProgress();
    if (idx < 0) idx = 0;
    if (idx >= SLIDES.length) idx = SLIDES.length - 1;
    currentIdx = idx;
    const s = SLIDES[idx];

    // Caption
    captionEye.textContent = s.eyebrow;
    captionText.innerHTML = s.narration;

    // Counter
    counterEl.textContent = (idx + 1) + ' / ' + SLIDES.length;

    // Nav highlight
    const visited = new Set();
    for (let i = 0; i < idx; i++) if (SLIDES[i].navKey) visited.add(SLIDES[i].navKey);
    updateNavHighlight(s.navKey, visited);

    // Page image vs title card
    frame.classList.add('transitioning');
    setTimeout(() => {
      if (s.titleCard) {
        pageImage.hidden = true;
        titleCard.hidden = false;
        tcSub.textContent  = s.titleCard.sub;
        tcBrand.innerHTML  = s.titleCard.brand;
        endActions.hidden  = !s.titleCard.end;
      } else {
        titleCard.hidden = true;
        pageImage.hidden = false;
        pageImage.src = s.image;
        pageImage.alt = s.eyebrow;
      }
      frame.classList.remove('transitioning');
    }, 200);

    // Disable / enable controls
    document.getElementById('prev-btn').disabled = (idx === 0);
    document.getElementById('next-btn').disabled = (idx === SLIDES.length - 1);

    // Pointer + dots + CTA — wait for the image to settle in
    setTimeout(() => {
      if (s.pointer === 'nav-sweep') {
        navSweep();
      } else if (Array.isArray(s.pointer) && s.pointer.length) {
        const ptr = buildPointer(s.pointer[0]);
        s.pointer.slice(1).forEach(wp => {
          pointerTimers.push(setTimeout(() => movePointerTo(ptr, wp.x, wp.y), wp.t * estimateMs));
        });
      }
      buildDots(s.dots || []);
      if (s.cta) buildCta(s.cta);
    }, 260);

    // Speak (also drives auto-advance on end)
    if (isPlaying) {
      runProgress();
      speak(s.narration, () => {
        // Slide ended — advance unless paused or last
        if (!isPlaying) return;
        if (currentIdx < SLIDES.length - 1) renderSlide(currentIdx + 1);
        else { /* parking on closer slide */ }
      });
    }
  }

  // ════════════════════════════════════════════════════════════
  //  PROGRESS bar drive
  // ════════════════════════════════════════════════════════════
  function runProgress() {
    cancelProgress();
    progressEl.style.transition = 'none';
    progressEl.style.transform = 'scaleX(0)';
    requestAnimationFrame(() => {
      progressEl.style.transition = `transform ${estimateMs || 12000}ms linear`;
      progressEl.style.transform = 'scaleX(1)';
    });
  }
  function cancelProgress() {
    progressEl.style.transition = 'none';
    const cur = parseFloat(getComputedStyle(progressEl).transform.split(',')[0].replace('matrix(', '')) || 0;
    progressEl.style.transform = `scaleX(${Math.min(cur, 1)})`;
  }

  // ════════════════════════════════════════════════════════════
  //  CONTROLS
  // ════════════════════════════════════════════════════════════
  function setPlayIcon() {
    document.getElementById('icon-pause').style.display = isPlaying ? 'block' : 'none';
    document.getElementById('icon-play').style.display  = isPlaying ? 'none'  : 'block';
    const btn = document.getElementById('play-pause-btn');
    btn.setAttribute('aria-label', isPlaying ? 'Pause' : 'Play');
    btn.setAttribute('title',      isPlaying ? 'Pause' : 'Play');
  }

  document.getElementById('prev-btn').addEventListener('click', () => renderSlide(currentIdx - 1));
  document.getElementById('next-btn').addEventListener('click', () => renderSlide(currentIdx + 1));
  document.getElementById('play-pause-btn').addEventListener('click', () => {
    isPlaying = !isPlaying;
    setPlayIcon();
    if (isPlaying) renderSlide(currentIdx);
    else { stopSpeaking(); cancelProgress(); }
  });
  document.getElementById('replay-btn').addEventListener('click', () => {
    isPlaying = true;
    setPlayIcon();
    renderSlide(0);
  });

  muteBtn.addEventListener('click', () => {
    isMuted = !isMuted;
    muteBtn.innerHTML = isMuted ? '🔇 Muted' : '🔊 Sound on';
    if (isMuted) {
      try { speechSynthesis.cancel(); } catch (e) {}
    } else if (isPlaying) {
      renderSlide(currentIdx);
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') { e.preventDefault(); renderSlide(currentIdx + 1); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); renderSlide(currentIdx - 1); }
    else if (e.key === ' ') { e.preventDefault(); document.getElementById('play-pause-btn').click(); }
    else if (e.key === 'Escape') { window.location.href = 'index.html'; }
  });

  // Re-place pointer/dots on resize
  window.addEventListener('resize', () => {
    const ptr = document.getElementById('pointer');
    const s = SLIDES[currentIdx];
    if (ptr && Array.isArray(s.pointer) && s.pointer.length) {
      // Snap to the latest waypoint we should be on
      setNormalizedPos(ptr, s.pointer[0].x, s.pointer[0].y);
    }
    document.querySelectorAll('.dot').forEach((el, i) => {
      if (s.dots && s.dots[i]) setNormalizedPos(el, s.dots[i].x, s.dots[i].y);
    });
    if (s.cta) {
      const cr = overlay.querySelector('.cta-ring');
      if (cr) {
        const rect = frame.getBoundingClientRect();
        cr.style.left   = (s.cta.x * rect.width)  + 'px';
        cr.style.top    = (s.cta.y * rect.height) + 'px';
        cr.style.width  = (s.cta.w * rect.width)  + 'px';
        cr.style.height = (s.cta.h * rect.height) + 'px';
      }
    }
  });

  // ════════════════════════════════════════════════════════════
  //  BOOT — render nav, prep voices, wait for Start gate
  // ════════════════════════════════════════════════════════════
  renderNav();

  // Pre-fetch voices (some browsers load them async)
  if ('speechSynthesis' in window) {
    speechSynthesis.getVoices();
    speechSynthesis.addEventListener('voiceschanged', () => {
      pickedVoice = pickVoice();
    });
    pickedVoice = pickVoice();
  }

  function beginTour(muted) {
    isMuted = !!muted;
    muteBtn.innerHTML = isMuted ? '🔇 Muted' : '🔊 Sound on';
    startGate.classList.add('hide');
    setTimeout(() => startGate.remove(), 500);
    renderSlide(0);
  }
  document.getElementById('start-btn').addEventListener('click', () => beginTour(false));
  document.getElementById('start-muted').addEventListener('click', () => beginTour(true));
</script>
