<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Quick Tour — Timpots Forever</title>
<meta name="description" content="A 3-minute visual tour of Timpots Forever — the alumni community for everyone who passed through Timpany School, Visakhapatnam.">
<meta property="og:title" content="A Quick Tour — Timpots Forever">
<meta property="og:description" content="A 3-minute visual tour of the Timpots Forever alumni site.">
<meta property="og:image" content="https://timpotsforever.org/images/tour/01-masthead.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500;1,700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #7a1420;
    --brand-dark: #4a0810;
    --ink: #1a1a1a;
    --ink-soft: #555;
    --ink-muted: #888;
    --bg: #fff;
    --bg-soft: #f7f4ee;
    --rule: #e5e0d4;
    --gold: #b5894a;
    --gold-bright: #f0c579;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    color: var(--ink);
    background: #1a0608;
    min-height: 100vh;
    overflow: hidden;
  }
  a { color: var(--gold-bright); text-decoration: none; }
  a:hover { text-decoration: underline; }

  /* ── Stage layout ───────────────────────────────────────── */
  .stage {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-rows: auto 1fr auto;
    color: #fff;
  }

  /* ── Top bar: brand + progress dots + close ─────────────── */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    background: rgba(0,0,0,0.25);
  }
  .brand-mark {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 500;
    color: #fff;
    white-space: nowrap;
  }
  .brand-mark em { color: var(--gold); font-style: italic; }
  .brand-sep {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
  }
  .progress-dots {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
    overflow: hidden;
    margin: 0 8px;
  }
  .progress-dot {
    flex: 1;
    height: 3px;
    min-width: 8px;
    background: rgba(255,255,255,0.18);
    border-radius: 2px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }
  .progress-dot:hover { background: rgba(255,255,255,0.32); }
  .progress-dot.done { background: var(--gold); }
  .progress-dot.active .progress-fill {
    position: absolute;
    inset: 0;
    background: var(--gold-bright);
    transform-origin: left;
    animation: fill var(--slide-duration, 16000ms) linear forwards;
  }
  .progress-dot.active.paused .progress-fill { animation-play-state: paused; }
  @keyframes fill { from { transform: scaleX(0); } to { transform: scaleX(1); } }

  .close-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 7px 16px;
    cursor: pointer;
    white-space: nowrap;
    text-decoration: none;
    transition: background 0.15s;
  }
  .close-btn:hover { background: rgba(255,255,255,0.1); text-decoration: none; }

  /* ── Slide stage ────────────────────────────────────────── */
  .slide-stage {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow: hidden;
    min-height: 0;
  }
  .slide {
    position: absolute;
    inset: 24px;
    display: grid;
    grid-template-rows: 1fr auto;
    gap: 20px;
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
  }
  .slide-image {
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    min-height: 0;
  }
  .slide-image img {
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 30px 80px rgba(0,0,0,0.55);
    border-radius: 4px;
  }
  .slide-caption {
    max-width: 880px;
    margin: 0 auto;
    text-align: center;
    padding: 0 16px;
  }
  .slide-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }
  .slide-eyebrow::before, .slide-eyebrow::after {
    content: "";
    width: 24px;
    height: 1px;
    background: var(--gold);
    opacity: 0.55;
  }
  .slide-title {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 500;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .slide-title em { color: var(--gold-bright); font-style: italic; }
  .slide-body {
    font-size: 15px;
    line-height: 1.55;
    color: rgba(255,255,255,0.82);
  }
  .slide-body a { color: var(--gold-bright); }

  /* ── Bottom controls ─────────────────────────────────────── */
  .bottom-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 14px 24px 18px;
    background: rgba(0,0,0,0.25);
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  .control-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 9px 11px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .control-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.45); }
  .control-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .control-btn svg { display: block; }
  .play-btn { padding: 9px 14px; min-width: 40px; }
  .slide-counter {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.08em;
    padding: 0 14px;
    font-variant-numeric: tabular-nums;
  }
  .cta-row {
    margin-left: 16px;
    display: flex;
    gap: 10px;
  }
  .cta-btn {
    background: var(--gold);
    color: var(--brand-dark);
    border: none;
    padding: 9px 18px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
  }
  .cta-btn:hover { background: var(--gold-bright); text-decoration: none; }
  .cta-btn.outline {
    background: none;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.45);
  }
  .cta-btn.outline:hover { background: rgba(255,255,255,0.1); }

  /* ── End card overlay ────────────────────────────────────── */
  .end-card {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 40px 24px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .end-card.show {
    opacity: 1;
    pointer-events: auto;
  }
  .end-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 500;
    color: #fff;
    margin-bottom: 12px;
    line-height: 1.15;
  }
  .end-card h2 em { color: var(--gold-bright); font-style: italic; }
  .end-card p {
    font-size: 17px;
    line-height: 1.55;
    color: rgba(255,255,255,0.85);
    max-width: 540px;
    margin: 0 auto 32px;
  }
  .end-card .end-buttons {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ── Responsive ──────────────────────────────────────────── */
  @media (max-width: 760px) {
    .top-bar { padding: 10px 14px; gap: 10px; }
    .brand-sep { display: none; }
    .brand-mark { font-size: 15px; }
    .slide-stage { padding: 14px; }
    .slide { inset: 14px; gap: 14px; }
    .slide-title { font-size: 20px; }
    .slide-body { font-size: 14px; }
    .bottom-bar { padding: 10px 14px 14px; gap: 8px; flex-wrap: wrap; }
    .slide-counter { padding: 0 8px; font-size: 11px; }
    .cta-row { margin-left: 0; width: 100%; justify-content: center; order: 99; }
    .cta-btn { padding: 8px 14px; font-size: 11px; }
    .end-card h2 { font-size: 30px; }
    .end-card p { font-size: 15px; }
  }
  @media (max-width: 480px) {
    .control-btn { padding: 8px 10px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .slide { transition: none; }
    .end-card { transition: none; }
    .progress-dot.active .progress-fill { animation: none; transform: scaleX(1); }
  }
</style>
</head>
<body>

<div class="stage" id="stage">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="brand-mark">Timpots <em>Forever</em></div>
    <div class="brand-sep">A 3-minute tour</div>
    <div class="progress-dots" id="progress-dots"></div>
    <a href="index.html" class="close-btn" aria-label="Exit tour">Skip ✕</a>
  </div>

  <!-- SLIDE STAGE -->
  <div class="slide-stage" id="slide-stage">
    <!-- Slides injected by JS -->

    <!-- END CARD (final slide overlay) -->
    <div class="end-card" id="end-card">
      <h2>Welcome <em>home</em>, Timpot.</h2>
      <p>Built by alumni, for alumni — and just getting started. Sign up free and add your batch year, house, and city so old friends can find you.</p>
      <div class="end-buttons">
        <a href="login.html" class="cta-btn">Sign up free</a>
        <a href="index.html" class="cta-btn outline">Explore the site</a>
      </div>
    </div>
  </div>

  <!-- BOTTOM CONTROLS -->
  <div class="bottom-bar">
    <button class="control-btn" id="prev" aria-label="Previous slide" title="Previous">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="control-btn play-btn" id="play-pause" aria-label="Pause" title="Pause">
      <svg id="icon-pause" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/></svg>
      <svg id="icon-play" viewBox="0 0 24 24" width="18" height="18" fill="currentColor" style="display:none;"><polygon points="6 4 20 12 6 20 6 4"/></svg>
    </button>
    <button class="control-btn" id="next" aria-label="Next slide" title="Next">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="slide-counter" id="slide-counter">1 / 11</div>
    <div class="cta-row">
      <a href="login.html" class="cta-btn">Sign up free</a>
    </div>
  </div>

</div>

<script>
  // ── Storyboard ──────────────────────────────────────────────
  const SLIDES = [
    {
      img: 'images/tour/01-masthead.png',
      eyebrow: 'Welcome',
      title: 'A home for every <em>Timpot</em>.',
      body: 'Timpots Forever is a community space for everyone who passed through Timpany School, Visakhapatnam. Built by alumni, for alumni — students, teachers, and staff.'
    },
    {
      img: 'images/tour/02-jazz.png',
      eyebrow: 'Dedication',
      title: 'Honouring <em>Jazz</em>.',
      body: 'The site is dedicated to Dr. Mercy Jeyaraja Rao — our beloved Jazz (1930&ndash;2026) — who led the school for generations and shaped Timpots into the people we became.'
    },
    {
      img: 'images/tour/03-hero.png',
      eyebrow: 'How it began',
      title: 'Out of a memorial, a <em>movement</em>.',
      body: 'After Jazz passed in March 2026, three alumni groups quietly formed: one builds this website, one is launching <em>The Timpany Times</em> newsletter, and one organises events like the Jeyaraja Rao Memorial Debate Competition.'
    },
    {
      img: 'images/tour/04-map.png',
      eyebrow: 'Timpots Worldwide',
      title: 'Find friends on a <em>live world map</em>.',
      body: 'Pins are coloured by house, clustered by city. Click any cluster to see who&rsquo;s where. No login needed to explore — but signing up puts you on the map too.'
    },
    {
      img: 'images/tour/05-directory.png',
      eyebrow: 'Alumni Directory',
      title: 'A <em>searchable</em> directory of Timpots.',
      body: 'For signed-in members: search by name, filter by class year, house, or city. Click any card to see the full profile — bio, contact links, and year-by-year attendance.'
    },
    {
      img: 'images/tour/06-memory-lane.png',
      eyebrow: 'Memory Lane',
      title: 'Forty memories, <em>nine themes</em>.',
      body: 'Stories from alumni about first days, Walking with Jazz, the teachers we remember, mischief, songs &amp; stages, campuses and haunts — drawn verbatim from the Timpots Forever group chat.'
    },
    {
      img: 'images/tour/07-school-history.png',
      eyebrow: 'School History',
      title: 'From <em>1931</em> to today.',
      body: 'The full story: campuses, leadership, the four houses, the crest, the school song — plus an A&ndash;Z directory of 66 teachers we still remember.'
    },
    {
      img: 'images/tour/08-famous.png',
      eyebrow: 'Famous Timpots',
      title: 'Six continents of <em>impact</em>.',
      body: 'Notable Timpots in sport, the arts, science, public service, and uniform. A growing list, drawn from what alumni themselves have shared — missing someone? Email us.'
    },
    {
      img: 'images/tour/09-calendar.png',
      eyebrow: 'Calendar & Events',
      title: 'Monthly meetups + <em>special events</em>.',
      body: 'Casual Timpots Meetups every second Sunday of the month, plus the inaugural Jeyaraja Rao Memorial Debate Competition on July 4, 2026, in Vizag.'
    },
    {
      img: 'images/tour/10-giving.png',
      eyebrow: 'Giving Back',
      title: 'Causes <em>Timpots</em> are quietly supporting.',
      body: 'A place to share the work alumni are doing — and to suggest causes you believe in. The form goes straight to us.'
    },
    {
      img: 'images/tour/11-signup.png',
      eyebrow: 'Get started',
      title: 'Sign up free. <em>Welcome home.</em>',
      body: 'Create an account in under a minute, then add your batch year, house, city, and a short bio so other Timpots can find you. Your full profile is members-only by default.'
    }
  ];

  // ── State ───────────────────────────────────────────────────
  const SLIDE_MS = 16000;
  let current = 0;
  let playing = true;
  let advanceTimer = null;
  let elapsedOnPause = 0;
  let slideStartTime = 0;
  let endReached = false;

  // ── Build the DOM once ──────────────────────────────────────
  const stageEl   = document.getElementById('slide-stage');
  const dotsEl    = document.getElementById('progress-dots');
  const counterEl = document.getElementById('slide-counter');
  const endCard   = document.getElementById('end-card');
  const prevBtn   = document.getElementById('prev');
  const nextBtn   = document.getElementById('next');
  const ppBtn     = document.getElementById('play-pause');
  const iconPlay  = document.getElementById('icon-play');
  const iconPause = document.getElementById('icon-pause');

  // Inject slides
  SLIDES.forEach((s, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.id = 'slide-' + i;
    slide.innerHTML = `
      <div class="slide-image"><img src="${s.img}" alt="${s.eyebrow}" loading="${i === 0 ? 'eager' : 'lazy'}"></div>
      <div class="slide-caption">
        <div class="slide-eyebrow">${s.eyebrow}</div>
        <div class="slide-title">${s.title}</div>
        <div class="slide-body">${s.body}</div>
      </div>
    `;
    stageEl.insertBefore(slide, endCard);
  });

  // Inject progress dots
  SLIDES.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'progress-dot';
    dot.dataset.idx = i;
    dot.innerHTML = '<div class="progress-fill"></div>';
    dot.addEventListener('click', () => goTo(i, true));
    dotsEl.appendChild(dot);
  });

  // ── Render current slide ────────────────────────────────────
  function render() {
    document.querySelectorAll('.slide').forEach((el, i) => {
      el.classList.toggle('active', i === current && !endReached);
    });
    document.querySelectorAll('.progress-dot').forEach((d, i) => {
      d.classList.remove('active', 'done', 'paused');
      if (endReached || i < current) d.classList.add('done');
      else if (i === current) {
        d.classList.add('active');
        if (!playing) d.classList.add('paused');
        // Restart the fill animation by re-inserting the fill node
        const fill = d.querySelector('.progress-fill');
        const fresh = fill.cloneNode(true);
        fill.parentNode.replaceChild(fresh, fill);
      }
    });
    counterEl.textContent = (endReached ? SLIDES.length : current + 1) + ' / ' + SLIDES.length;
    prevBtn.disabled = current === 0 && !endReached;
    nextBtn.disabled = endReached;
    endCard.classList.toggle('show', endReached);
  }

  // ── Navigation ──────────────────────────────────────────────
  function goTo(idx, resume) {
    clearTimeout(advanceTimer);
    endReached = false;
    if (idx < 0) idx = 0;
    if (idx >= SLIDES.length) { showEndCard(); return; }
    current = idx;
    slideStartTime = Date.now();
    elapsedOnPause = 0;
    if (resume) playing = true;
    syncPlayIcon();
    render();
    schedule();
  }
  function next() { goTo(current + 1, false); }
  function prev() { goTo(current - 1, false); }
  function schedule() {
    clearTimeout(advanceTimer);
    if (!playing || endReached) return;
    const remaining = SLIDE_MS - elapsedOnPause;
    advanceTimer = setTimeout(() => {
      if (current >= SLIDES.length - 1) showEndCard();
      else goTo(current + 1, true);
    }, remaining);
  }

  function showEndCard() {
    clearTimeout(advanceTimer);
    endReached = true;
    document.querySelectorAll('.slide').forEach(el => el.classList.remove('active'));
    render();
  }

  // ── Play / pause ────────────────────────────────────────────
  function togglePlay() {
    if (endReached) { goTo(0, true); return; }
    playing = !playing;
    if (playing) {
      slideStartTime = Date.now();
      schedule();
    } else {
      elapsedOnPause += Date.now() - slideStartTime;
      clearTimeout(advanceTimer);
    }
    syncPlayIcon();
    document.querySelectorAll('.progress-dot.active').forEach(d => d.classList.toggle('paused', !playing));
  }
  function syncPlayIcon() {
    iconPlay.style.display  = playing ? 'none' : 'block';
    iconPause.style.display = playing ? 'block' : 'none';
    ppBtn.setAttribute('aria-label', playing ? 'Pause' : 'Play');
    ppBtn.setAttribute('title',      playing ? 'Pause' : 'Play');
  }

  // ── Wire controls ───────────────────────────────────────────
  prevBtn.addEventListener('click', prev);
  nextBtn.addEventListener('click', next);
  ppBtn.addEventListener('click', togglePlay);
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); if (e.key === ' ') togglePlay(); else next(); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); prev(); }
    else if (e.key === 'Escape') { window.location.href = 'index.html'; }
  });

  // ── Set CSS var for animation duration ──────────────────────
  document.documentElement.style.setProperty('--slide-duration', SLIDE_MS + 'ms');

  // ── Kick off ────────────────────────────────────────────────
  goTo(0, true);
</script>

</body>
</html>
