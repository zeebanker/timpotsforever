    /* ── On-dark text ── */
    --white: #ffffff;
    --gold-bright: #f0c579;
    --cream-text: #e8dfc9;
    --cream-muted: #cfc5a8;
    --pink-tint: #e8d5d8;
    --pink-muted: #c8a0a5;
    --gold-muted: #b5a07a;
    --gold-pale: #f0e4c8;

    /* ── Footer / dark sections ── */
    --footer-text: #c5c0b4;
    --footer-muted: #a59e8e;
    --footer-dim: #767060;
    --footer-rule: #333333;
    --footer-rule-dark: #2a2a2a;

    /* ── Garnet gradient stops ── */
    --garnet-mid: #3a1520;
    --garnet-deep: #2a0a12;
    --garnet-muted: #5a2530;
    --garnet-darkest: #2a0407;

    /* ── Leather / warm gradient stops ── */
    --leather: #3a2515;
    --leather-mid: #5a3d22;
    --leather-dark: #2a1810;
    --leather-darkest: #1a0a05;
    --gold-dark: #7a5328;
    --leather-border: #3a2818;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  a { color: var(--brand); text-decoration: none; }
  a:hover { text-decoration: underline; }
  img { max-width: 100%; display: block; }

  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 28px;
  }

  /* ============ TOP INSTITUTIONAL BAR ============ */
  .inst-bar {
    background: var(--brand-dark);
    padding: 8px 0;
    font-size: 12px;
    color: var(--pink-tint);
  }

  .inst-bar .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .inst-bar a {
    color: var(--pink-tint);
    margin-right: 18px;
  }
  .inst-bar a:hover { color: var(--white); }

  .inst-bar .left { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .inst-bar .right { display: flex; gap: 18px; flex-wrap: wrap; }

  /* ============ MASTHEAD (logo + school name) ============ */
  .masthead {
    background: var(--bg);
    padding: 22px 0;
    border-bottom: 1px solid var(--rule);
  }

  .masthead .row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 30px;
  }

  .masthead-left  { justify-self: start; }
  .brand-mark     { justify-self: center; }
  .masthead-right {
    justify-self: end;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  /* ── User affordance (login / signed-in) ──────────────── */
  .user-affordance {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--ink);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 8px 10px;
    transition: color 0.15s;
  }
  .user-affordance:hover { color: var(--brand); text-decoration: none; }
  .user-affordance .user-icon { width: 22px; height: 22px; flex-shrink: 0; }
  .user-affordance .user-initial {
    display: none;
    align-items: center;
    justify-content: center;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--brand);
    color: #fff;
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0;
    text-transform: none;
    flex-shrink: 0;
  }
  .user-affordance.signed-in .user-icon    { display: none; }
  .user-affordance.signed-in .user-initial { display: inline-flex; }

  /* ── Hamburger (mobile only) ──────────────────────────── */
  .hamburger {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 28px;
    height: 22px;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
  }
  .hamburger span {
    display: block;
    height: 2px;
    width: 100%;
    background: var(--ink);
    transform-origin: center;
    transition: transform 0.25s ease, opacity 0.2s ease;
  }
  body.menu-open .hamburger span:nth-child(1) { transform: translateY(10px) rotate(45deg); }
  body.menu-open .hamburger span:nth-child(2) { opacity: 0; }
  body.menu-open .hamburger span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

  /* ── Locked protected nav items (logged out) ──────────── */
  .main-nav a.protected-link.locked::before {
    content: '';
    display: inline-block;
    width: 11px;
    height: 13px;
    margin-right: 7px;
    vertical-align: -1px;
    background-color: currentColor;
    -webkit-mask: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 14 16'%3E%3Cpath fill='black' d='M7 0a4 4 0 0 0-4 4v3H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1h-1V4a4 4 0 0 0-4-4Zm0 2a2 2 0 0 1 2 2v3H5V4a2 2 0 0 1 2-2Z'/%3E%3C/svg%3E") no-repeat center / contain;
            mask: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 14 16'%3E%3Cpath fill='black' d='M7 0a4 4 0 0 0-4 4v3H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1h-1V4a4 4 0 0 0-4-4Zm0 2a2 2 0 0 1 2 2v3H5V4a2 2 0 0 1 2-2Z'/%3E%3C/svg%3E") no-repeat center / contain;
    opacity: 0.75;
  }

  .brand-mark {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .brand-logo {
    display: block;
    height: 56px;
    aspect-ratio: 724 / 366;
    background-color: var(--brand);
    -webkit-mask: url('images/logo.png') no-repeat center / contain;
            mask: url('images/logo.png') no-repeat center / contain;
  }

  .brand-est {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brand);
  }

  .brand-mark .text h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 56px;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1;
    margin-bottom: 4px;
  }

  .brand-mark .text h1 em {
    font-style: italic;
    font-weight: 500;
    color: var(--brand);
  }

  .brand-mark .text .tag {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .utility-nav {
    display: flex;
    gap: 22px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .utility-nav a {
    color: var(--ink-soft);
    position: relative;
    padding: 6px 0;
  }

  .utility-nav a.give {
    background: var(--brand);
    color: var(--white);
    padding: 8px 18px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 11px;
  }

  .utility-nav a.give:hover {
    background: var(--brand-dark);
    text-decoration: none;
  }

  /* ============ MAIN NAV ============ */
  .main-nav {
    background: var(--brand);
    border-bottom: 4px solid var(--gold);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .main-nav .row {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .main-nav a {
    color: var(--gold-bright);
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 18px 24px;
    transition: background 0.15s;
    position: relative;
  }

  .main-nav a:hover {
    background: var(--brand-dark);
    text-decoration: none;
  }

  .main-nav a.active {
    background: var(--brand-dark);
  }

  .main-nav a.highlight {
    background: rgba(255, 255, 255, 0.08);
  }

  /* ============ HERO ============ */
  .hero {
    position: relative;
    height: 560px;
    overflow: hidden;
    background: var(--ink);
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(100deg, rgba(26, 10, 13, 0.92) 0%, rgba(26, 10, 13, 0.72) 45%, rgba(26, 10, 13, 0.15) 100%),
      url('https://picsum.photos/seed/lisbon-city/1600/900');
    background-size: cover;
    background-position: center;
  }

  .hero-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)),
      repeating-linear-gradient(45deg,
        transparent 0,
        transparent 2px,
        rgba(255, 255, 255, 0.015) 2px,
        rgba(255, 255, 255, 0.015) 4px
      );
  }

  .hero-bg::after {
    content: '';
    position: absolute;
    top: 50%;
    right: 5%;
    transform: translateY(-50%);
    width: 340px;
    height: 340px;
    background-image: var(--logo-watermark);
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.22;
  }

  /* ============ WATERMARKS on content sections ============ */
  .feature-band,
  .give-section,
  .site-footer {
    position: relative;
    overflow: hidden;
  }

  .feature-band::before,
  .give-section::before,
  .site-footer::before {
    content: '';
    position: absolute;
    top: 50%;
    right: -60px;
    transform: translateY(-50%);
    width: 380px;
    height: 380px;
    background-image: var(--logo-watermark);
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.07;
    pointer-events: none;
    z-index: 0;
  }

  .site-footer::before {
    opacity: 0.09;
    right: auto;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 460px;
    height: 460px;
  }

  .feature-band > *,
  .give-section > *,
  .site-footer > * {
    position: relative;
    z-index: 1;
  }

  .hero-portrait {
    position: absolute;
    top: 50%;
    right: 6%;
    transform: translateY(-50%);
    width: 320px;
    height: 400px;
    background:
      linear-gradient(180deg, rgba(42, 20, 24, 0.3) 0%, rgba(26, 10, 13, 0.5) 60%, rgba(26, 10, 13, 0.95) 100%),
      linear-gradient(160deg, var(--garnet-mid) 0%, var(--garnet-muted) 50%, var(--garnet-deep) 100%);
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(240, 197, 121, 0.2);
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-portrait::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(240, 197, 121, 0.25);
    pointer-events: none;
  }

  .hero-portrait-silhouette {
    width: 140px;
    height: 140px;
    opacity: 0.5;
    margin-top: -40px;
  }

  .hero-portrait::after {
    content: 'Featured Alumna';
    position: absolute;
    bottom: 22px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--gold-bright);
    letter-spacing: 0.06em;
  }

  @media (max-width: 900px) {
    .hero-portrait { display: none; }
  }

  .hero-content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    align-items: flex-end;
    padding-bottom: 60px;
  }

  .hero-inner {
    max-width: 640px;
    color: var(--white);
  }

  .hero-label {
    display: inline-block;
    background: var(--gold);
    color: var(--ink);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 6px 12px;
    margin-bottom: 22px;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    font-size: clamp(36px, 5.5vw, 54px);
    line-height: 1.08;
    letter-spacing: -0.01em;
    margin-bottom: 18px;
    color: var(--white);
  }

  .hero-title em {
    font-style: italic;
    color: var(--gold-bright);
    font-weight: 500;
  }

  .hero-dek {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    line-height: 1.5;
    color: var(--cream-text);
    font-style: italic;
    max-width: 560px;
    margin-bottom: 24px;
  }

  .hero-byline {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-muted);
    font-weight: 600;
  }

  .hero-byline span { color: var(--gold-bright); }

  /* ============ STORIES ROW ============ */
  .stories-row {
    padding: 60px 0 70px;
    background: var(--bg);
  }

  .stories-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 36px;
  }

  @media (min-width: 720px) {
    .stories-grid { grid-template-columns: 1fr 1fr 1fr; gap: 40px; }
  }

  .story-card .card-image {
    width: 100%;
    aspect-ratio: 16 / 10;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-image.c1 {
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 60%, var(--garnet-darkest) 100%);
  }
  .card-image.c2 {
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 50%, var(--leather-border) 100%);
  }
  .card-image.c3 {
    background: linear-gradient(135deg, var(--leather) 0%, var(--leather-mid) 50%, var(--leather-dark) 100%);
  }

  .card-image svg {
    width: 80px;
    height: 80px;
    opacity: 0.35;
  }

  .card-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 35%, rgba(240, 197, 121, 0.12) 0%, transparent 60%);
    pointer-events: none;
  }

  .story-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 10px;
  }

  .story-card h3 a { color: var(--ink); }
  .story-card h3 a:hover { color: var(--brand); text-decoration: none; }

  .story-card p {
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-soft);
  }

  .more-stories {
    text-align: right;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
  }

  .more-stories a {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--brand);
  }

  .more-stories a::after {
    content: ' →';
  }

  /* ============ NEWSLETTER CALLOUT ============ */
  .newsletter-callout {
    margin-top: 48px;
    background: var(--ink);
    background-image: linear-gradient(160deg, var(--garnet-mid) 0%, var(--garnet-deep) 100%);
    padding: 40px 44px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    align-items: center;
    border-left: 4px solid var(--gold);
  }

  @media (min-width: 720px) {
    .newsletter-callout { grid-template-columns: 1fr auto; gap: 40px; }
  }

  .newsletter-callout .nc-label {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-bright);
    margin-bottom: 10px;
  }

  .newsletter-callout h3 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 500;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--white);
    margin-bottom: 8px;
  }

  .newsletter-callout h3 em {
    font-style: italic;
    color: var(--gold-bright);
  }

  .newsletter-callout p {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--cream-text);
    line-height: 1.5;
  }

  .newsletter-callout a.nc-btn {
    display: inline-block;
    background: var(--gold);
    color: var(--ink);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 28px;
    white-space: nowrap;
  }

  .newsletter-callout a.nc-btn:hover {
    background: var(--gold-bright);
    text-decoration: none;
  }

  /* ============ DIRECTORY + EVENTS ============ */
  .dir-events {
    padding: 60px 0;
    background: var(--bg-soft);
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }

  .de-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 40px;
  }

  @media (min-width: 820px) {
    .de-grid { grid-template-columns: 1.3fr 1fr; gap: 56px; }
  }

  .panel {
    background: var(--bg);
    padding: 36px 40px;
    border-top: 4px solid var(--brand);
  }

  .panel h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 18px;
    letter-spacing: -0.01em;
  }

  .panel h2 a { color: var(--ink); }
  .panel h2 a:hover { color: var(--brand); text-decoration: none; }

  .search-box {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .search-box input {
    flex: 1;
    padding: 12px 16px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    border: 1px solid var(--rule);
    background: var(--bg-soft);
    color: var(--ink);
  }

  .search-box input:focus {
    outline: none;
    border-color: var(--brand);
  }

  .search-box button {
    padding: 12px 22px;
    background: var(--brand);
    color: var(--white);
    border: none;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .search-box button:hover {
    background: var(--brand-dark);
  }

  .panel-note {
    font-size: 13px;
    color: var(--ink-muted);
    margin-top: 10px;
  }

  .panel-note a { font-weight: 600; }

  /* Event item */
  .event-item {
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 18px;
    padding: 16px 0;
    border-bottom: 1px solid var(--rule);
  }

  .event-item:last-child { border-bottom: none; }

  .event-date {
    text-align: center;
    padding: 10px 8px;
    background: var(--brand);
    color: var(--white);
  }

  .event-date .month {
    display: block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .event-date .day {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 600;
    line-height: 1;
    margin-top: 2px;
  }

  .event-body h4 {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .event-body h4 a { color: var(--ink); }
  .event-body h4 a:hover { color: var(--brand); text-decoration: none; }

  .event-time {
    font-size: 12px;
    color: var(--ink-muted);
    letter-spacing: 0.05em;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .event-body p {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.5;
  }

  /* ============ HISTORY + JAZZ FEATURE BANDS ============ */
  .feature-band {
    padding: 80px 0;
    position: relative;
    overflow: hidden;
  }

  .feature-band.history {
    background: var(--bg-warm);
    border-top: 4px solid var(--gold);
  }

  .feature-band.jazz {
    background: var(--ink);
    color: var(--white);
  }

  .band-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 40px;
    align-items: center;
  }

  @media (min-width: 820px) {
    .band-grid { grid-template-columns: 1fr 1fr; gap: 60px; }
  }

  .band-visual {
    aspect-ratio: 4 / 3;
    position: relative;
    overflow: hidden;
  }

  .band-visual.history-viz {
    background:
      linear-gradient(135deg, rgba(122, 20, 32, 0.08) 0%, transparent 100%),
      repeating-linear-gradient(0deg,
        var(--bg-warm) 0,
        var(--bg-warm) 28px,
        rgba(122, 20, 32, 0.06) 28px,
        rgba(122, 20, 32, 0.06) 29px
      );
    border: 1px solid var(--rule);
  }

  .band-visual.history-viz::before {
    content: '1931';
    position: absolute;
    top: 24px;
    left: 28px;
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--brand);
  }

  .band-visual.history-viz::after {
    content: 'Est.';
    position: absolute;
    bottom: 24px;
    right: 28px;
    font-family: 'Playfair Display', serif;
    font-size: 160px;
    font-weight: 400;
    font-style: italic;
    color: var(--brand);
    line-height: 0.8;
    opacity: 0.9;
  }

  .band-visual.jazz-viz {
    background:
      radial-gradient(ellipse at 50% 35%, rgba(240, 197, 121, 0.18) 0%, transparent 60%),
      linear-gradient(160deg, var(--leather-dark) 0%, var(--leather-darkest) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .jazz-portrait {
    width: 68%;
    aspect-ratio: 3 / 4;
    background:
      linear-gradient(160deg, var(--leather) 0%, var(--leather-mid) 50%, var(--leather-dark) 100%);
    position: relative;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(240, 197, 121, 0.25);
    padding: 22px;
    display: flex;
    flex-direction: column;
  }

  .jazz-portrait::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    bottom: 10px;
    border: 1px solid rgba(240, 197, 121, 0.3);
    pointer-events: none;
  }

  .jazz-portrait-inner {
    flex: 1;
    background: linear-gradient(180deg, var(--leather-dark) 0%, var(--leather-darkest) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 36px 24px 32px;
    position: relative;
  }

  .jazz-photo {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background-size: cover;
    background-position: center 15%;
    background-repeat: no-repeat;
    border: 3px solid var(--gold);
    box-shadow: 0 0 0 1px rgba(240, 197, 121, 0.4), 0 12px 40px rgba(0, 0, 0, 0.6);
    margin-bottom: 22px;
    filter: sepia(8%) brightness(1.02);
    flex-shrink: 0;
  }

  .jazz-portrait-inner .jp-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--gold-bright);
    text-align: center;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }

  .jazz-portrait-inner .jp-nick {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 32px;
    color: var(--white);
    margin: 14px 0;
    font-weight: 400;
  }

  .jazz-portrait-inner .jp-years {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px solid rgba(240, 197, 121, 0.25);
    width: 100%;
    text-align: center;
  }

  .jazz-portrait-inner .jp-role {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2px;
  }

  .band-chip {
    display: inline-block;
    padding: 6px 14px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  .history .band-chip {
    background: var(--brand);
    color: var(--white);
  }

  .jazz .band-chip {
    background: var(--gold-bright);
    color: var(--ink);
  }

  .band-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(38px, 5vw, 56px);
    font-weight: 500;
    line-height: 0.98;
    letter-spacing: -0.02em;
    margin-bottom: 22px;
  }

  .history .band-title { color: var(--ink); }
  .jazz .band-title { color: var(--white); }

  .band-title em {
    font-style: italic;
    font-weight: 400;
  }

  .history .band-title em { color: var(--brand); }
  .jazz .band-title em { color: var(--gold-bright); }

  .band-text {
    font-size: 16px;
    line-height: 1.7;
    margin-bottom: 24px;
  }

  .history .band-text { color: var(--ink-soft); }
  .jazz .band-text { color: var(--cream-muted); }

  .band-link {
    display: inline-block;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding-bottom: 4px;
    border-bottom: 2px solid;
  }

  .history .band-link { color: var(--brand); border-color: var(--brand); }
  .jazz .band-link { color: var(--gold-bright); border-color: var(--gold-bright); }

  .band-link::after { content: ' →'; }
  .band-link:hover { text-decoration: none; }

  /* ============ GIVE ============ */
  .give-section {
    padding: 70px 0;
    background: var(--brand);
    color: var(--white);
    text-align: center;
  }

  .give-section h2 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 5vw, 48px);
    font-weight: 500;
    margin-bottom: 14px;
    letter-spacing: -0.01em;
  }

  .give-section h2 em {
    font-style: italic;
    color: var(--gold-bright);
  }

  .give-section p {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 19px;
    color: var(--pink-tint);
    max-width: 560px;
    margin: 0 auto 36px;
  }

  .give-buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-bottom: 22px;
  }

  .give-buttons a {
    padding: 14px 28px;
    background: transparent;
    color: var(--white);
    border: 1px solid rgba(255, 255, 255, 0.4);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .give-buttons a:hover {
    background: var(--white);
    color: var(--brand);
    text-decoration: none;
  }

  .give-buttons a.primary {
    background: var(--gold-bright);
    border-color: var(--gold-bright);
    color: var(--ink);
  }

  .give-buttons a.primary:hover {
    background: var(--white);
    border-color: var(--white);
  }

  .give-note {
    font-size: 12px;
    color: var(--pink-muted);
    letter-spacing: 0.08em;
  }

  .give-note a {
    color: var(--gold-bright);
  }

  /* Philanthropy additions */
  .philanthropy .phil-label {
    display: inline-block;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-bright);
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(240, 197, 121, 0.4);
  }

  .philanthropy .phil-dek {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--gold-bright);
    max-width: 640px;
    margin: 0 auto 32px;
  }

  .philanthropy .phil-body {
    max-width: 640px;
    margin: 0 auto 40px;
    text-align: left;
  }

  .philanthropy .phil-body p {
    font-family: 'Source Sans 3', sans-serif;
    font-style: normal;
    font-size: 15px;
    line-height: 1.75;
    color: var(--gold-pale);
    margin-bottom: 18px;
  }

  .philanthropy .phil-body p strong {
    color: var(--gold-bright);
    font-weight: 600;
  }

  /* ============ CAREERS ============ */
  .careers {
    padding: 60px 0 70px;
  }

  .section-heading {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 32px;
    letter-spacing: -0.015em;
  }

  .section-heading em {
    font-style: italic;
    color: var(--brand);
  }

  .careers-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 28px;
  }

  @media (min-width: 720px) {
    .careers-grid { grid-template-columns: 1fr 1fr 1fr; }
  }

  .career-card {
    background: var(--bg-soft);
    padding: 28px 30px;
    border-left: 3px solid var(--brand);
  }

  .career-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 12px;
    line-height: 1.25;
  }

  .career-card h3 a { color: var(--ink); }
  .career-card h3 a:hover { color: var(--brand); text-decoration: none; }

  .career-card p {
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-soft);
  }

  /* ============ SOCIAL ============ */
  .social {
    padding: 60px 0;
    background: var(--bg-soft);
    border-top: 1px solid var(--rule);
  }

  .social-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .social-links {
    display: flex;
    gap: 14px;
  }

  .social-links a {
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--brand);
    color: var(--white);
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 16px;

  .social-links a:hover {

  }

  .social-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
  }

  @media (min-width: 680px) {
    .social-grid { grid-template-columns: 1fr 1fr 1fr; }
  }

  .social-post {
    background: var(--bg);
    padding: 22px 24px;
    border: 1px solid var(--rule);
    font-size: 14px;
    line-height: 1.55;
    color: var(--ink-soft);
  }

  .social-post .handle {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--brand);
    margin-bottom: 10px;
    display: block;
  }

  .social-post .tag {
    color: var(--brand);
    font-weight: 600;
  }

  /* ============ FOOTER ============ */
  .site-footer {
    background: var(--ink);
    color: var(--footer-text);
    padding: 60px 0 30px;
  }

  .footer-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 40px;
    margin-bottom: 40px;
  }

  @media (min-width: 760px) {
    .footer-grid { grid-template-columns: 1.5fr 1fr 1fr; }
  }

  .footer-brand {
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }

  .footer-brand img {
    width: 54px;
    height: auto;
    filter: brightness(0) invert(0.85);
  }

  .footer-brand .text h3 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .footer-brand .text p {
    font-size: 13px;
    line-height: 1.6;
    color: var(--footer-muted);
  }

  .footer-col h4 {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold-bright);
    margin-bottom: 14px;
  }

  .footer-col ul { list-style: none; }
  .footer-col li { padding: 5px 0; }
  .footer-col a { color: var(--footer-text); font-size: 13px; }
  .footer-col a:hover { color: var(--white); text-decoration: none; }

  .footer-bottom {
    padding-top: 24px;
    border-top: 1px solid var(--footer-rule);
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--footer-dim);
    letter-spacing: 0.05em;
    flex-wrap: wrap;
    gap: 14px;
  }

  .footer-bottom a { color: var(--footer-muted); margin-left: 16px; font-size: 11px; }

  .footer-disclaimer {
    margin-top: 22px;
    padding-top: 22px;
    border-top: 1px solid var(--footer-rule-dark);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    line-height: 1.7;
    color: var(--footer-dim);
    font-style: italic;
    max-width: 720px;
  }

  /* ============ RESPONSIVE TIGHTENING ============ */
  @media (max-width: 720px) {
    .inst-bar .left a:nth-child(n+4) { display: none; }
    .utility-nav a:not(.give):nth-child(n+3) { display: none; }
    .main-nav a { padding: 14px 12px; font-size: 12px; }
    .masthead .row {
      grid-template-columns: auto 1fr auto;
      gap: 10px;
    }
    .brand-logo { height: 28px; }
    .brand-mark .text h1 { font-size: 28px; }

    .hamburger { display: flex; }
    .user-affordance .user-label { display: none; }
    .user-affordance { padding: 6px; }

    /* Mobile nav: collapse to a drawer below the masthead */
    .main-nav {
      position: static;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }
    body.menu-open .main-nav { max-height: 80vh; }
    .main-nav .row {
      flex-direction: column;
      align-items: stretch;
    }
    .main-nav a {
      text-align: center;
      width: 100%;
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .main-nav a:last-child { border-bottom: none; }
    .panel { padding: 28px 24px; }
    .hero { height: 460px; }
  }

  /* ============ SECTION LOADER STYLES ============ */
  .section-error {
    padding: 40px;
    text-align: center;
    background: #ffebee;
    border: 2px solid #ff6b6b;
    margin: 20px 0;
    border-radius: 4px;
    font-family: 'Source Sans 3', sans-serif;
    color: #c00;
  }

  .section-error h3 {
    margin-top: 0;
    font-size: 16px;
    color: #c00;
  }

  .section-error p {
    margin: 8px 0 0 0;
    font-size: 13px;
    color: #666;
  }

  .section-loading {
    padding: 40px;
    text-align: center;
    color: var(--ink-muted);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 13px;
  }
</style>
</head>

<body>

<!-- Section containers with IDs for loader script -->
<div id="section-masthead"></div>
<div id="section-nav"></div>
<div id="section-jazz"></div>
<div id="section-hero"></div>
<div id="section-stories"></div>
<div id="section-newsletter"></div>
<div id="section-directory-events"></div>
<div id="section-history"></div>
<div id="section-give"></div>
<div id="section-social"></div>
<div id="section-footer"></div>

<script>
  // ============ INCREMENTAL SECTION LOADER ============
  
  const sections = [
    { id: 'masthead', path: 'sections/static/masthead.html', name: 'Masthead' },
    { id: 'nav', path: 'sections/static/nav.html', name: 'Navigation' },
    { id: 'jazz', path: 'sections/dynamic/jazz.html', name: 'Jazz Memorial' },
    { id: 'hero', path: 'sections/dynamic/hero.html', name: 'Featured Story' },
    { id: 'stories', path: 'sections/dynamic/stories.html', name: 'Stories' },
    { id: 'newsletter', path: 'sections/dynamic/newsletter-callout.html', name: 'Newsletter' },
    { id: 'directory-events', path: 'sections/dynamic/directory-events.html', name: 'Directory & Events' },
    { id: 'history', path: 'sections/dynamic/history.html', name: 'History' },
    { id: 'give', path: 'sections/dynamic/give.html', name: 'Philanthropy' },
    { id: 'social', path: 'sections/dynamic/social.html', name: 'Social' },
    { id: 'footer', path: 'sections/static/footer.html', name: 'Footer' }
  ];

  /**
   * Load a single section and inject it into the page
   * @param {Object} section - Section config object
   */
  async function loadSection(section) {
    const container = document.getElementById(`section-${section.id}`);
    
    if (!container) {
      console.error(`Container not found for section: ${section.id}`);
      return;
    }

    // Show loading state
    container.innerHTML = `<div class="section-loading">Loading ${section.name}...</div>`;

    try {
      const response = await fetch(section.path);
      
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const html = await response.text();
      container.innerHTML = html;
      
      console.log(`✓ Loaded: ${section.name}`);
    } catch (error) {
      console.error(`✗ Failed to load ${section.name}:`, error);
      
      container.innerHTML = `
        <div class="section-error">
          <h3>Failed to load ${section.name}</h3>
          <p>${error.message}</p>
        </div>
      `;
    }
  }

  /**
   * Load all sections incrementally (one at a time, in order)
   */
  async function loadAllSections() {
    for (const section of sections) {
      await loadSection(section);
    }
    document.dispatchEvent(new CustomEvent('sectionsLoaded'));
  }

  // Start loading sections when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadAllSections);
  } else {
    loadAllSections();
  }
</script>

<!-- Hamburger toggle (event delegation — works regardless of section load order) -->
<script>
  document.addEventListener('click', function(e) {
    if (e.target.closest('.hamburger')) {
      const btn = e.target.closest('.hamburger');
      const isOpen = document.body.classList.toggle('menu-open');
      btn.setAttribute('aria-expanded', String(isOpen));
      return;
    }
    if (e.target.closest('.main-nav a')) {
      document.body.classList.remove('menu-open');
      const btn = document.getElementById('hamburger');
      if (btn) btn.setAttribute('aria-expanded', 'false');
    }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && document.body.classList.contains('menu-open')) {
      document.body.classList.remove('menu-open');
      const btn = document.getElementById('hamburger');
      if (btn) btn.setAttribute('aria-expanded', 'false');
    }
  });
</script>

<!-- Supabase + auth (must come BEFORE protected-link handler so `supabase` is defined) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>

<!-- Protected link event handler (delegated, so it works after async section load) -->
<script>
  document.addEventListener('click', async function(e) {
    const link = e.target.closest('.protected-link');
    if (!link) return;
    e.preventDefault();
    if (typeof supabase === 'undefined') {
      window.location.href = 'login.html';
      return;
    }
    const { data: { session } } = await supabase.auth.getSession();
    window.location.href = session ? link.dataset.dest : 'login.html';
  });
</script>

</body>
</html>
