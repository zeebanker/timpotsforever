<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500;1,700&display=swap" rel="stylesheet">
<title>Timpots Forever</title>

<style>
:root {
    --brand: #7a1420;       /* deep garnet, reminiscent of HBS crimson but distinct */
    --brand-dark: #4a0810;
    --brand-light: #a83040;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-muted: #767676;
    --bg: #ffffff;
    --bg-soft: #f5f2ec;
    --bg-warm: #ebe4d3;
    --rule: #d8d3c4;
    --gold: #b5894a;

    /* ── On-dark text ── */
    --white: #ffffff;
    --gold-bright: #f0c579;
    --cream-text: #e8dfc9;
    --cream-muted: #cfc5a8;
    --pink-tint: #e8d5d8;
    --pink-muted: #c8a0a5;
    --gold-muted: #b5a07a;
    --gold-pale: #f0e4c8;

    /* ── Footer / dark sections ── */
    --footer-text: #c5c0b4;
    --footer-muted: #a59e8e;
    --footer-dim: #767060;
    --footer-rule: #333333;
    --footer-rule-dark: #2a2a2a;

    /* ── Garnet gradient stops ── */
    --garnet-mid: #3a1520;
    --garnet-deep: #2a0a12;
    --garnet-muted: #5a2530;
    --garnet-darkest: #2a0407;

    /* ── Leather / warm gradient stops ── */
    --leather: #3a2515;
    --leather-mid: #5a3d22;
    --leather-dark: #2a1810;
    --leather-darkest: #1a0a05;
    --gold-dark: #7a5328;
    --leather-border: #3a2818;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }

  a { color: var(--brand); text-decoration: none; }
  a:hover { text-decoration: underline; }
  img { max-width: 100%; display: block; }

  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 28px;
  }

  /* ============ TOP INSTITUTIONAL BAR ============ */
  .inst-bar {
    background: var(--brand-dark);
    padding: 8px 0;
    font-size: 12px;
    color: var(--pink-tint);
  }

  .inst-bar .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .inst-bar a {
    color: var(--pink-tint);
    margin-right: 18px;
  }
  .inst-bar a:hover { color: var(--white); }

  .inst-bar .left { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .inst-bar .right { display: flex; gap: 18px; flex-wrap: wrap; }

  /* ============ MASTHEAD (logo + school name) ============ */
  .masthead {
    background: var(--bg);
    padding: 22px 0;
    border-bottom: 1px solid var(--rule);
  }

  .masthead .row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 30px;
  }

  .masthead-left  { justify-self: start; display: inline-flex; align-items: center; }
  .brand-mark     { justify-self: center; }
  .masthead-right {
    justify-self: end;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  /* ── User affordance (login / signed-in) ──────────────── */
  .user-affordance {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--ink);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 8px 10px;
    transition: color 0.15s;
  }
  .user-affordance:hover { color: var(--brand); text-decoration: none; }
  .user-affordance .user-icon { width: 22px; height: 22px; flex-shrink: 0; }
  .user-affordance .user-initial {
    display: none;
    align-items: center;
    justify-content: center;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--brand);
    color: #fff;
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 15px;
    letter-spacing: 0;
    text-transform: none;
    flex-shrink: 0;
  }
  .user-affordance.signed-in .user-icon    { display: none; }
  .user-affordance.signed-in .user-initial { display: inline-flex; }

  /* ── Hamburger (mobile only) ──────────────────────────── */
  .hamburger {
    display: none;
    flex-direction: column;
    justify-content: space-between;
    width: 28px;
    height: 22px;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
  }
  .hamburger span {
    display: block;
    height: 2px;
    width: 100%;
    background: var(--ink);
    transform-origin: center;
    transition: transform 0.25s ease, opacity 0.2s ease;
  }
  body.menu-open .hamburger span:nth-child(1) { transform: translateY(10px) rotate(45deg); }
  body.menu-open .hamburger span:nth-child(2) { opacity: 0; }
  body.menu-open .hamburger span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

  /* ── Locked protected nav items (logged out) ──────────── */
  .main-nav a.protected-link.locked::before {
    content: '';
    display: inline-block;
    width: 11px;
    height: 13px;
    margin-right: 7px;
    vertical-align: -1px;
    background-color: currentColor;
    -webkit-mask: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 14 16'%3E%3Cpath fill='black' d='M7 0a4 4 0 0 0-4 4v3H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1h-1V4a4 4 0 0 0-4-4Zm0 2a2 2 0 0 1 2 2v3H5V4a2 2 0 0 1 2-2Z'/%3E%3C/svg%3E") no-repeat center / contain;
            mask: url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 14 16'%3E%3Cpath fill='black' d='M7 0a4 4 0 0 0-4 4v3H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1h-1V4a4 4 0 0 0-4-4Zm0 2a2 2 0 0 1 2 2v3H5V4a2 2 0 0 1 2-2Z'/%3E%3C/svg%3E") no-repeat center / contain;
    opacity: 0.75;
  }

  .brand-mark {
    display: inline-flex;
    align-items: center;
  }

  .brand-est {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--brand);
  }

  .brand-mark .text h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 56px;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1;
    margin-bottom: 4px;
  }

  .brand-mark .text h1 em {
    font-style: italic;
    font-weight: 500;
    color: var(--brand);
  }

  .brand-mark .text .tag {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }

  .utility-nav {
    display: flex;
    gap: 22px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
  }

  .utility-nav a {
    color: var(--ink-soft);
    position: relative;
    padding: 6px 0;
  }

  .utility-nav a.give {
    background: var(--brand);
    color: var(--white);
    padding: 8px 18px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 11px;
  }

  .utility-nav a.give:hover {
    background: var(--brand-dark);
    text-decoration: none;
  }

  /* ============ MAIN NAV ============ */
  .main-nav {
    background: var(--brand);
    border-bottom: 4px solid var(--gold);
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .main-nav .row {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }

  .main-nav a {
    color: var(--gold-bright);
    font-family: 'Playfair Display', serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 18px 24px;
    transition: background 0.15s;
    position: relative;
  }

  .main-nav a:hover {
    background: var(--brand-dark);
    text-decoration: none;
  }

  .main-nav a.active {
    background: var(--brand-dark);
  }

  .main-nav a.highlight {
    background: rgba(255, 255, 255, 0.08);
  }

  /* ============ HERO ============ */
  .hero {
    position: relative;
    min-height: 560px;
    overflow: hidden;
    background: var(--ink);
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(100deg, rgba(26, 10, 13, 0.92) 0%, rgba(26, 10, 13, 0.72) 45%, rgba(26, 10, 13, 0.15) 100%),
      url('https://picsum.photos/seed/lisbon-city/1600/900');
    background-size: cover;
    background-position: center;
  }

  .hero-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)),
      repeating-linear-gradient(45deg,
        transparent 0,
        transparent 2px,
        rgba(255, 255, 255, 0.015) 2px,
        rgba(255, 255, 255, 0.015) 4px
      );
  }

  .feature-band,
  .give-section,
  .site-footer {
    position: relative;
    overflow: hidden;
  }

  .hero-portrait {
    position: absolute;
    top: 50%;
    right: 6%;
    transform: translateY(-50%);
    width: 320px;
    height: 400px;
    background:
      linear-gradient(180deg, rgba(42, 20, 24, 0.3) 0%, rgba(26, 10, 13, 0.5) 60%, rgba(26, 10, 13, 0.95) 100%),
      linear-gradient(160deg, var(--garnet-mid) 0%, var(--garnet-muted) 50%, var(--garnet-deep) 100%);
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(240, 197, 121, 0.2);
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-portrait::before {
    content: '';
    position: absolute;
    inset: 10px;
    border: 1px solid rgba(240, 197, 121, 0.25);
    pointer-events: none;
  }

  .hero-marks {
    position: relative;
    z-index: 1;
    width: 100%;
    padding: 36px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
  }
  .hero-mark {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    text-align: center;
  }
  .hero-mark-icon {
    display: block;
    width: 38px;
    height: 38px;
    color: var(--gold-bright);
  }
  .hero-mark-name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1.1;
    color: #fff;
    letter-spacing: 0.01em;
  }
  .hero-mark-name em {
    font-style: italic;
    color: var(--gold-bright);
  }
  .hero-marks-divider {
    width: 60%;
    height: 1px;
    background: rgba(240, 197, 121, 0.35);
  }

  @media (max-width: 900px) {
    .hero-portrait { display: none; }
  }

  .hero-content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    align-items: flex-end;
    padding-bottom: 60px;
  }

  .hero-inner {
    max-width: 640px;
    color: var(--white);
  }

  .hero-label {
    display: inline-block;
    background: var(--gold);
    color: var(--ink);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 6px 12px;
    margin-bottom: 22px;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-weight: 500;
    font-size: clamp(36px, 5.5vw, 54px);
    line-height: 1.08;
    letter-spacing: -0.01em;
    margin-bottom: 18px;
    color: var(--white);
  }

  .hero-title em {
    font-style: italic;
    color: var(--gold-bright);
    font-weight: 500;
  }

  .hero-dek {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    line-height: 1.55;
    color: var(--cream-text);
    font-style: italic;
    max-width: 560px;
    margin-bottom: 24px;
  }
  .hero-dek p { margin-bottom: 14px; }
  .hero-dek p:last-child { margin-bottom: 0; }
  .hero-dek p strong { color: var(--gold-bright); font-weight: 600; font-style: normal; }
  .hero-dek p em { color: var(--gold-bright); }

  .hero-byline {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold-muted);
    font-weight: 600;
  }

  .hero-byline span { color: var(--gold-bright); }

  /* ============ STORIES ROW ============ */
  .stories-row {
    padding: 60px 0 70px;
    background: var(--bg);
  }
  .stories-row.newsletter-section {
    padding-top: 0;
    padding-bottom: 80px;
  }

  .stories-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 36px;
  }

  @media (min-width: 720px) {
    .stories-grid { grid-template-columns: 1fr 1fr 1fr; gap: 40px; }
  }

  .story-card .card-image {
    width: 100%;
    aspect-ratio: 16 / 10;
    margin-bottom: 18px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-image.c1 {
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 60%, var(--garnet-darkest) 100%);
  }
  .card-image.c2 {
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-dark) 60%, var(--garnet-darkest) 100%);
  }
  .card-art.classroom {
    width: 72%;
    aspect-ratio: 980 / 700;
    background-color: var(--gold-bright);
    -webkit-mask: url('images/classroom-line.png') center/contain no-repeat;
            mask: url('images/classroom-line.png') center/contain no-repeat;
  }
  .card-art.teamwork {
    width: 90%;
    aspect-ratio: 612 / 204;
    background-color: var(--gold-bright);
    -webkit-mask: url('images/teamwork-line.png') center/contain no-repeat;
            mask: url('images/teamwork-line.png') center/contain no-repeat;
  }
  .card-art.teacher {
    width: 56%;
    aspect-ratio: 1 / 1;
    background-color: var(--gold-bright);
    -webkit-mask: url('images/teacher-line.png') center/contain no-repeat;
            mask: url('images/teacher-line.png') center/contain no-repeat;
  }
  .card-image.c3 {
    background: linear-gradient(135deg, var(--leather) 0%, var(--leather-mid) 50%, var(--leather-dark) 100%);
  }

  .card-image svg {
    width: 80px;
    height: 80px;
    opacity: 0.35;
  }

  /* Icon row variant — wider SVG, full opacity, no stroke dim */
  .card-image.card-image-icons svg {
    width: 78%;
    height: auto;
    opacity: 0.92;
  }

  .card-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 35%, rgba(240, 197, 121, 0.12) 0%, transparent 60%);
    pointer-events: none;
  }

  .story-card h3 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 500;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 10px;
  }

  .story-card h3 a { color: var(--ink); }
  .story-card h3 a:hover { color: var(--brand); text-decoration: none; }

  .story-card p {
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink-soft);
  }

  .more-stories {
    text-align: right;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
  }

  .more-stories a {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--brand);
  }

  .more-stories a::after {
    content: ' →';
  }

  /* ============ NEWSLETTER CALLOUT ============ */
  .newsletter-callout {
    margin-top: 48px;
    background: var(--ink);
    background-image: linear-gradient(160deg, var(--garnet-mid) 0%, var(--garnet-deep) 100%);
    padding: 40px 44px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 20px;
    align-items: center;
    border-left: 4px solid var(--gold);
  }

  @media (min-width: 720px) {
    .newsletter-callout { grid-template-columns: 1fr auto; gap: 40px; }
  }

  .newsletter-callout .nc-label {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-bright);
    margin-bottom: 10px;
  }

  .newsletter-callout h3 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 500;
    line-height: 1.15;
    letter-spacing: -0.01em;
    color: var(--white);
    margin-bottom: 8px;
  }

  .newsletter-callout h3 em {
    font-style: italic;
    color: var(--gold-bright);
  }

  .newsletter-callout p {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--cream-text);
    line-height: 1.5;
  }

  .newsletter-callout a.nc-btn {
    display: inline-block;
    background: var(--gold);
    color: var(--ink);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 14px 28px;
    white-space: nowrap;
  }

  .newsletter-callout a.nc-btn:hover {
    background: var(--gold-bright);
    text-decoration: none;
  }

  /* ============ DIRECTORY + EVENTS ============ */
  .dir-events {
    padding: 60px 0;
    background: var(--bg-soft);
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }

  .de-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 40px;
  }

  @media (min-width: 820px) {
    .de-grid { grid-template-columns: 1.3fr 1fr; gap: 56px; }
  }

  .panel {
    background: var(--bg);
    padding: 36px 40px;
    border-top: 4px solid var(--brand);
  }

  .panel h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 18px;
    letter-spacing: -0.01em;
  }

  .panel h2 a { color: var(--ink); }
  .panel h2 a:hover { color: var(--brand); text-decoration: none; }

  .search-box {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .search-box input {
    flex: 1;
    padding: 12px 16px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    border: 1px solid var(--rule);
    background: var(--bg-soft);
    color: var(--ink);
  }

  .search-box input:focus {
    outline: none;
    border-color: var(--brand);
  }

  .search-box button {
    padding: 12px 22px;
    background: var(--brand);
    color: var(--white);
    border: none;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
  }

  .search-box button:hover {
    background: var(--brand-dark);
  }

  .panel-note {
    font-size: 13px;
    color: var(--ink-muted);
    margin-top: 10px;
  }

  .panel-note a { font-weight: 600; }

  /* Event item */
  .event-item {
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 18px;
    padding: 16px 0;
    border-bottom: 1px solid var(--rule);
  }

  .event-item:last-child { border-bottom: none; }

  .event-date {
    text-align: center;
    padding: 10px 8px;
    background: var(--brand);
    color: var(--white);
  }

  .event-date .month {
    display: block;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .event-date .day {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 600;
    line-height: 1;
    margin-top: 2px;
  }

  .event-body h4 {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .event-body h4 a { color: var(--ink); }
  .event-body h4 a:hover { color: var(--brand); text-decoration: none; }

  .event-time {
    font-size: 12px;
    color: var(--ink-muted);
    letter-spacing: 0.05em;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .event-body p {
    font-size: 13px;
    color: var(--ink-soft);

  /* ============ RESPONSIVE TIGHTENING ============ */
  @media (max-width: 720px) {
    .inst-bar .left a:nth-child(n+4) { display: none; }
    .utility-nav a:not(.give):nth-child(n+3) { display: none; }
    .main-nav a { padding: 14px 12px; font-size: 12px; }
    .masthead .row {
      grid-template-columns: auto 1fr auto;
      gap: 10px;
    }
    .brand-logo { height: 28px; }
    .brand-mark .text h1 { font-size: 28px; }

    .hamburger { display: flex; }
    .user-affordance .user-label { display: none; }
    .user-affordance { padding: 6px; }

    /* Mobile nav: collapse to a drawer below the masthead */
    .main-nav {
      position: static;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }
    body.menu-open .main-nav {
      max-height: 85vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .main-nav .row {
      flex-direction: column;
      align-items: stretch;
    }
    .main-nav a {
      text-align: center;
      width: 100%;
      padding: 12px 24px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .main-nav a:last-child { border-bottom: none; }
    .panel { padding: 28px 24px; }
    .hero { height: auto; min-height: 460px; }
    .hero-content { padding-top: 40px; }

    /* Jazz dedication — keep the portrait fully visible and fit the name */
    .band-visual.jazz-viz {
      aspect-ratio: auto;
      padding: 30px 0;
    }
    .jazz-portrait {
      width: 86%;
      max-width: 340px;
      padding: 18px;
    }
    .jazz-portrait-inner {
      padding: 28px 18px 24px;
    }
    .jazz-photo {
      width: 140px;
      height: 140px;
      margin-bottom: 18px;
    }
    .jazz-portrait-inner .jp-name {
      font-size: 17px;
      line-height: 1.2;
    }
    .jazz-portrait-inner .jp-nick {
      font-size: 26px;
      margin: 10px 0;
    }

  /* ============ SECTION LOADER STYLES ============ */

  /* ============ COMING-SOON utilities ============
     Shared chip + states used across placeholder cards / sections.
     ============================================ */
  .coming-soon-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .coming-soon-chip::before {
    content: "";
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    display: inline-block;
  }

  /* Live indicator — sibling of .coming-soon-chip for content that
     IS live and actively growing (e.g. the Alumni Directory). Same
     visual treatment; the dot gently pulses to signal liveness. */
  .live-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .live-chip::before {
    content: "";
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    display: inline-block;
    animation: live-pulse 2.2s ease-in-out infinite;
  }
  @keyframes live-pulse {
    0%, 100% { transform: scale(1);   opacity: 1; }
    50%      { transform: scale(1.4); opacity: 0.55; }
  }
  @media (prefers-reduced-motion: reduce) {
    .live-chip::before { animation: none; }
  }

  /* Disabled "more" link — looks present, signals not yet active */
  .more-soon {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 13px;
    font-style: italic;
    color: var(--ink-muted);
    letter-spacing: 0.04em;
  }

  /* Social channels: muted + disabled state */
  .social-links.is-coming-soon a {
    opacity: 0.45;
    pointer-events: none;
    cursor: default;
  }
  .social-coming-note {
    font-family: 'Source Sans 3', sans-serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-muted);
    margin-right: 14px;
    letter-spacing: 0.02em;
  }

  /* Footer link rendered as muted "(coming soon)" text instead of <a> */
  .footer-col li .cs-tag {
    font-style: italic;
    color: var(--ink-muted);
    font-size: 12px;
    font-weight: 400;
    margin-left: 4px;
  }
  .footer-col li.coming-soon-li {
    color: var(--footer-text);
    font-size: 13px;
  }

  /* Event item — placeholder variant for the homepage events panel */
  .event-item.is-placeholder { opacity: 0.7; }
  .event-item.is-placeholder .event-date {
    border-color: var(--rule) !important;
  }
  .event-item.is-placeholder .event-date .month,
  .event-item.is-placeholder .event-date .day {
    color: var(--ink-muted) !important;
  }
</style>
</head>

<body>

<!-- Section containers with IDs for loader script -->
<div id="section-masthead"></div>
<div id="section-nav"></div>

<div id="section-jazz"></div>
<div id="section-hero"></div>
<div id="section-whats-next"></div>
<div id="section-volunteer"></div>
<div id="section-stories"></div>
<div id="section-newsletter"></div>
<div id="section-directory-events"></div>
<div id="section-history"></div>
<div id="section-give"></div>
<div id="section-social"></div>
<div id="section-footer"></div>

<div class="plutonian-credit">
  Conceived, designed, developed and sponsored by a <em>Plutonian</em>.
</div>

<script>
  // ============ INCREMENTAL SECTION LOADER ============
  
  const sections = [
    { id: 'masthead', path: 'sections/static/masthead.html', name: 'Masthead' },
    { id: 'nav', path: 'sections/static/nav.html', name: 'Navigation' },
    { id: 'jazz', path: 'sections/dynamic/jazz.html', name: 'Jazz Memorial' },
    { id: 'hero', path: 'sections/dynamic/hero.html', name: 'Featured Story' },
    { id: 'whats-next', path: 'sections/dynamic/whats-next.html', name: 'Where We Are Headed' },
    { id: 'volunteer', path: 'sections/dynamic/volunteer.html', name: 'Volunteer' },
    { id: 'stories', path: 'sections/dynamic/stories.html', name: 'Stories' },
    { id: 'newsletter', path: 'sections/dynamic/newsletter-callout.html', name: 'Newsletter' },
    { id: 'directory-events', path: 'sections/dynamic/directory-events.html', name: 'Directory & Events' },
    { id: 'history', path: 'sections/dynamic/history.html', name: 'History' },
    { id: 'give', path: 'sections/dynamic/give.html', name: 'Philanthropy' },
    { id: 'social', path: 'sections/dynamic/social.html', name: 'Social' },
    { id: 'footer', path: 'sections/static/footer.html', name: 'Footer' }
  ];

  /**
   * Load a single section and inject it into the page
   * @param {Object} section - Section config object
   */
  async function loadSection(section) {
    const container = document.getElementById(`section-${section.id}`);
    
    if (!container) {
      console.error(`Container not found for section: ${section.id}`);
      return;
    }

    // Show loading state
    container.innerHTML = `<div class="section-loading">Loading ${section.name}...</div>`;

    try {
      const response = await fetch(section.path);
      
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
      }

      const html = await response.text();
      container.innerHTML = html;
      
      console.log(`✓ Loaded: ${section.name}`);
    } catch (error) {
      console.error(`✗ Failed to load ${section.name}:`, error);
      
      container.innerHTML = `
        <div class="section-error">
          <h3>Failed to load ${section.name}</h3>
          <p>${error.message}</p>
        </div>
      `;
    }
  }

  /**
   * Load all sections incrementally (one at a time, in order)
   */
  async function loadAllSections() {
    for (const section of sections) {
      await loadSection(section);
    }
    document.dispatchEvent(new CustomEvent('sectionsLoaded'));

    // If the URL has a hash (e.g. index.html#jazz), the browser scrolled
    // before the section existed. Re-scroll now that everything's in place.
    if (window.location.hash) {
      const id = window.location.hash.slice(1);
      const el = document.getElementById(id);
      if (el) {
        // Defer one frame to let layout settle
        requestAnimationFrame(() => {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
      }
    }
  }

  // Start loading sections when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', loadAllSections);
  } else {
    loadAllSections();
  }
</script>

<!-- Hamburger toggle (event delegation — works regardless of section load order) -->
<script>
  document.addEventListener('click', function(e) {
    if (e.target.closest('.hamburger')) {
      const btn = e.target.closest('.hamburger');
      const isOpen = document.body.classList.toggle('menu-open');
      btn.setAttribute('aria-expanded', String(isOpen));
      return;
    }
    if (e.target.closest('.main-nav a')) {
      document.body.classList.remove('menu-open');
      const btn = document.getElementById('hamburger');
      if (btn) btn.setAttribute('aria-expanded', 'false');
    }
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && document.body.classList.contains('menu-open')) {
      document.body.classList.remove('menu-open');
      const btn = document.getElementById('hamburger');
      if (btn) btn.setAttribute('aria-expanded', 'false');
    }
  });
</script>

<!-- Supabase + auth (must come BEFORE protected-link handler so `supabase` is defined) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>

<!-- Protected link event handler (delegated, so it works after async section load) -->
<script>
  document.addEventListener('click', async function(e) {
    const link = e.target.closest('.protected-link');
    if (!link) return;
    e.preventDefault();
    if (typeof supabase === 'undefined') {
      window.location.href = 'login.html';
      return;
    }
    const { data: { session } } = await supabase.auth.getSession();
    window.location.href = session ? link.dataset.dest : 'login.html';
  });
</script>

</body>
