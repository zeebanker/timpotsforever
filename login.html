<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Timpots Forever</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500;1,700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --brand: #7a1420;
    --brand-dark: #4a0810;
    --ink: #1a1a1a;
    --ink-soft: #555;
    --ink-muted: #888;
    --bg: #fff;
    --bg-soft: #f7f4ee;
    --rule: #e5e0d4;
    --gold: #b5894a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    color: var(--ink);
    background: var(--bg-soft);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .auth-container {
    max-width: 440px;
    margin: 60px auto 40px;
    padding: 0 24px;
    flex: 1;
    width: 100%;
  }
  .auth-box {
    background: #fff;
    border: 1px solid var(--rule);
    padding: 40px 36px;
  }
  .auth-box h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 6px;
    text-align: center;
    line-height: 1.2;
  }
  .auth-box h1 em {
    font-style: italic;
    font-weight: 500;
    color: var(--brand);
  }
  .auth-subtitle {
    text-align: center;
    font-size: 13px;
    color: var(--ink-muted);
    margin-bottom: 28px;
    letter-spacing: 0.05em;
  }
  .tab-row {
    display: flex;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 24px;
  }
  .tab-btn {
    flex: 1;
    padding: 12px 0;
    text-align: center;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }
  .tab-btn:hover { color: var(--brand); }

  .auth-panel { display: none; }
  .auth-panel#panel-login { display: block; }

  .auth-field {
    display: flex;
    flex-direction: column;
    margin-bottom: 16px;
  }
  .auth-field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .auth-field input {
    width: 100%;
    padding: 10px 12px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 15px;
    border: 1px solid var(--rule);
    background: #fff;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
  }
  .auth-field input:focus { border-color: var(--brand); }

  /* ── Password input with show/hide toggle ─────────────── */
  .password-wrap { position: relative; }
  .password-wrap input { padding-right: 44px; }
  .password-toggle {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    color: var(--ink-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.15s;
  }
  .password-toggle:hover { color: var(--brand); }
  .password-toggle svg { display: block; }
  .password-toggle .eye-hide { display: none; }
  .password-toggle.visible .eye-show { display: none; }
  .password-toggle.visible .eye-hide { display: block; }
  .auth-submit {
    width: 100%;
    padding: 12px 28px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--brand);
    color: #fff;
    border: none;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 6px;
  }
  .auth-submit:hover { background: var(--brand-dark); }
  .auth-submit:disabled { opacity: 0.6; cursor: wait; }

  #auth-error {
    display: none;
    background: #fef2f2;
    border: 1px solid #fca5a5;
    color: #991b1b;
    padding: 12px 14px;
    font-size: 13px;
    margin-bottom: 16px;
    border-radius: 2px;
  }
  #auth-success {
    display: none;
    background: #f0fdf4;
    border: 1px solid #86efac;
    color: #166534;
    padding: 12px 14px;
    font-size: 13px;
    margin-bottom: 16px;
    border-radius: 2px;
  }
  .auth-link {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--ink-muted);
  }
  .auth-link a {
    color: var(--brand);
    text-decoration: underline;
    cursor: pointer;
  }
  .back-link {
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
  }
  .back-link a { color: var(--ink-soft); text-decoration: none; }
  .back-link a:hover { color: var(--brand); }
</style>
</head>

<body>

<div class="auth-container">
  <div class="auth-box">
    <h1>Timpots <em>Forever</em></h1>
    <p class="auth-subtitle">Alumni community · timpotsforever.org</p>

    <div class="tab-row">
      <button class="tab-btn active" id="tab-login" onclick="showTab('login')">Login</button>
      <button class="tab-btn" id="tab-signup" onclick="showTab('signup')">Sign Up</button>
      <button class="tab-btn" id="tab-forgot" onclick="showTab('forgot')">Forgot Password</button>
    </div>

    <div id="auth-error"></div>
    <div id="auth-success"></div>

    <div class="auth-panel" id="panel-login">
      <form onsubmit="handleLogin(event)">
        <div class="auth-field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" autocomplete="email" inputmode="email" placeholder="your.name@example.com" required>
        </div>
        <div class="auth-field">
          <label for="login-password">Password</label>
          <div class="password-wrap">
            <input type="password" id="login-password" autocomplete="current-password" placeholder="••••••••" required>
            <button type="button" class="password-toggle" data-target="login-password" aria-label="Show password" title="Show password">
              <svg class="eye-show" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-hide" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.4 10.4 0 0 1 12 19c-7 0-10-7-10-7a17.6 17.6 0 0 1 4.06-5.94"/>
                <path d="M9.9 4.24A9.7 9.7 0 0 1 12 4c7 0 10 7 10 7a17.4 17.4 0 0 1-2.16 3.19"/>
                <path d="M14.12 14.12A3 3 0 1 1 9.88 9.88"/>
                <line x1="2" y1="2" x2="22" y2="22"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="auth-submit">Login</button>
      </form>
      <div class="auth-link">
        Don't have an account? <a onclick="showTab('signup')">Sign up</a>
      </div>
    </div>

    <div class="auth-panel" id="panel-signup">
      <form onsubmit="handleSignup(event)">
        <div class="auth-field">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" autocomplete="email" inputmode="email" placeholder="your.name@example.com" required>
        </div>
        <div class="auth-field">
          <label for="signup-password">Password</label>
          <div class="password-wrap">
            <input type="password" id="signup-password" autocomplete="new-password" placeholder="At least 6 characters" required>
            <button type="button" class="password-toggle" data-target="signup-password" aria-label="Show password" title="Show password">
              <svg class="eye-show" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-hide" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.4 10.4 0 0 1 12 19c-7 0-10-7-10-7a17.6 17.6 0 0 1 4.06-5.94"/>
                <path d="M9.9 4.24A9.7 9.7 0 0 1 12 4c7 0 10 7 10 7a17.4 17.4 0 0 1-2.16 3.19"/>
                <path d="M14.12 14.12A3 3 0 1 1 9.88 9.88"/>
                <line x1="2" y1="2" x2="22" y2="22"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="auth-field">
          <label for="signup-confirm">Confirm Password</label>
          <div class="password-wrap">
            <input type="password" id="signup-confirm" autocomplete="new-password" placeholder="••••••••" required>
            <button type="button" class="password-toggle" data-target="signup-confirm" aria-label="Show password" title="Show password">
              <svg class="eye-show" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="eye-hide" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.4 10.4 0 0 1 12 19c-7 0-10-7-10-7a17.6 17.6 0 0 1 4.06-5.94"/>
                <path d="M9.9 4.24A9.7 9.7 0 0 1 12 4c7 0 10 7 10 7a17.4 17.4 0 0 1-2.16 3.19"/>
                <path d="M14.12 14.12A3 3 0 1 1 9.88 9.88"/>
                <line x1="2" y1="2" x2="22" y2="22"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="auth-submit">Create Account</button>
      </form>
      <div class="auth-link">
        Already have an account? <a onclick="showTab('login')">Login</a>
      </div>
    </div>

    <div class="auth-panel" id="panel-forgot">
      <form onsubmit="handleForgotPassword(event)">
        <div class="auth-field">
          <label for="forgot-email">Email</label>
          <input type="email" id="forgot-email" autocomplete="email" inputmode="email" placeholder="your.name@example.com" required>
        </div>
        <button type="submit" class="auth-submit">Send Reset Link</button>
      </form>
      <div class="auth-link">
        Remembered it? <a onclick="showTab('login')">Back to login</a>
      </div>
    </div>
  </div>

  <div class="back-link">
    <a href="index.html">← Back to Timpots Forever</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
