<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Timpots — Timpots Forever</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500;1,700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap">

<!-- Leaflet (map engine) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">

<style>
  :root {
    --brand: #7a1420;
    --brand-dark: #4a0810;
    --brand-light: #a83040;
    --gold: #b5894a;
    --gold-bright: #f0c579;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-muted: #767676;
    --bg: #ffffff;
    --bg-soft: #f7f4ee;
    --bg-warm: #ebe4d3;
    --rule: #e5e0d4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--ink);
    background: var(--bg-soft);
    display: flex;
    flex-direction: column;
  }
  .wrap { max-width: 1400px; margin: 0 auto; padding: 0 20px; width: 100%; }

  /* ── Header bar (matches members.html / profile.html pattern) ─── */
  .members-header {
    background: var(--brand);
    padding: 14px 0;
    color: #fff;
    flex-shrink: 0;
  }
  .members-header .wrap {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }
  .members-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 500;
  }
  .members-header h2 em {
    font-style: italic;
    color: var(--gold);
  }
  .members-header .actions {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header-icon-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    text-decoration: none;
    opacity: 0.85;
    padding: 6px;
    transition: opacity 0.15s;
  }
  .header-icon-link:hover { opacity: 1; }
  .header-icon-link svg { display: block; }

  /* ── User affordance (mirrors masthead.html so auth.js can update it) ── */
  .user-affordance {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #fff;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 6px 10px;
    opacity: 0.9;
    transition: opacity 0.15s;
  }
  .user-affordance:hover { opacity: 1; }
  .user-affordance .user-icon { width: 22px; height: 22px; flex-shrink: 0; }
  .user-affordance .user-initial {
    display: none;
    align-items: center;
    justify-content: center;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--brand-dark);
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0;
    text-transform: none;
    flex-shrink: 0;
  }
  .user-affordance.signed-in .user-icon    { display: none; }
  .user-affordance.signed-in .user-initial { display: inline-flex; }

  /* ── Map fills remaining viewport ─────────────────────────────── */
  main {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  #map {
    width: 100%;
    height: 100%;
    background: var(--bg-soft);
  }
  .leaflet-container {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--bg-soft);
  }

  /* ── Status banner (loading / empty / error) ─────────────────── */
  .status-banner {
    position: absolute;
    left: 50%;
    bottom: 24px;
    transform: translateX(-50%);
    background: rgba(255, 255, 255, 0.96);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 10px 18px;
    font-size: 13px;
    color: var(--ink-soft);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    z-index: 800;
    max-width: 90%;
    text-align: center;
  }
  .status-banner.hidden { display: none; }
  .status-banner.error  { color: #991b1b; border-color: #fca5a5; background: #fef2f2; }
  .status-banner a { color: var(--brand); text-decoration: underline; }

  /* ── Logo overlay over Vizag (recolored to garnet via SVG filter) ── */
  .vizag-logo { filter: url(#garnet-tint); opacity: 0.32; pointer-events: none; }

  /* ── Pin and cluster Leaflet customizations ───────────────────── */
  .city-pin { background: none !important; border: none !important; }
  .house-cluster { background: none !important; border: none !important; }
  .leaflet-popup-content {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 14px;
    margin: 12px 14px;
  }
  .leaflet-popup-content strong {
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--brand);
  }
  .leaflet-popup-content em {
    color: var(--ink-muted);
    font-size: 12px;
  }

  /* ── Responsive ─────────────────────────────────────────────── */
  @media (max-width: 600px) {
    .members-header h2 { font-size: 16px; }
    .user-affordance { padding: 6px; }
    .user-affordance .user-label { display: none; }
  }
</style>
</head>

<body>

<!-- ─────────────────────────────────────────────────────────────
     Hidden SVG defs: garnet-tint filter for the Vizag logo overlay,
     plus radial/linear gradients used by per-pin SVGs.
     ───────────────────────────────────────────────────────────── -->
<svg style="position:absolute; width:0; height:0;" aria-hidden="true">
  <defs>
    <filter id="garnet-tint">
      <feColorMatrix type="matrix" values="
        0 0 0 0 0.478
        0 0 0 0 0.078
        0 0 0 0 0.125
        0 0 0 1 0"/>
    </filter>
    <radialGradient id="pluto" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#e8a8b0"/>
      <stop offset="40%"  stop-color="#a83040"/>
      <stop offset="100%" stop-color="#3a0810"/>
    </radialGradient>
    <radialGradient id="mercury" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#f0e4a8"/>
      <stop offset="40%"  stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#7a5328"/>
    </radialGradient>
    <radialGradient id="jupiter" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#a8c5e8"/>
      <stop offset="40%"  stop-color="#2f5a9e"/>
      <stop offset="100%" stop-color="#0a2548"/>
    </radialGradient>
    <radialGradient id="neptune" cx="35%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#a8d8b8"/>
      <stop offset="40%"  stop-color="#2d7a3f"/>
      <stop offset="100%" stop-color="#0a3a18"/>
    </radialGradient>
    <linearGradient id="spike" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#dadada"/>
      <stop offset="50%"  stop-color="#a8a8a8"/>
      <stop offset="100%" stop-color="#666666"/>
    </linearGradient>
  </defs>
</svg>

<!-- ── Header bar ─────────────────────────────────────────────── -->
<div class="members-header">
  <div class="wrap">
    <h2>Timpots <em>Forever</em> — Find Timpots</h2>
    <div class="actions">
      <a href="index.html" class="header-icon-link" aria-label="Home" title="Home">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 10.5 12 3l9 7.5V21H3z"/>
          <path d="M9 21v-7h6v7"/>
        </svg>
      </a>
      <a href="login.html" class="user-affordance" id="user-affordance" aria-label="Sign in">
        <svg class="user-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/>
        </svg>
        <span class="user-label">Sign in</span>
      </a>
    </div>
  </div>
</div>

<!-- ── Map ─────────────────────────────────────────────────────── -->
<main>
  <div id="map"></div>
  <div id="status-banner" class="status-banner">Loading alumni…</div>
</main>

<!-- ── Scripts ─────────────────────────────────────────────────── -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>

<script>
  // ════════════════════════════════════════════════════════════
  // House definitions (must match the timpany_house enum values)
  // ════════════════════════════════════════════════════════════
  const HOUSES = {
    pluto:   { label: 'Pluto / Venus', mid: '#a83040', dark: '#3a0810' },
    mercury: { label: 'Mercury',       mid: '#d4a017', dark: '#7a5328' },
    jupiter: { label: 'Jupiter',       mid: '#2f5a9e', dark: '#0a2548' },
    neptune: { label: 'Neptune',       mid: '#2d7a3f', dark: '#0a3a18' }
  };
  const HOUSE_KEYS = ['pluto', 'mercury', 'jupiter', 'neptune'];

  // ════════════════════════════════════════════════════════════
  // Map setup — Visakhapatnam-centered, no tile layer (uses country
  // GeoJSON for borders only), maxZoom required by markercluster.
  // ════════════════════════════════════════════════════════════
  const VIZAG = [17.6868, 83.2185];
  const map = L.map('map', { maxZoom: 18, worldCopyJump: true }).setView(VIZAG, 3);

  // Custom pane so the Vizag logo renders ABOVE country polygons but BELOW markers
  map.createPane('vizagPane');
  map.getPane('vizagPane').style.zIndex = 450;

  // Seek Truth logo over Visakhapatnam (~2° wide × 1° tall)
  const LOGO_BOUNDS = [
    [VIZAG[0] - 0.5, VIZAG[1] - 1.0],
    [VIZAG[0] + 0.5, VIZAG[1] + 1.0]
  ];
  L.imageOverlay('images/logo.png', LOGO_BOUNDS, {
    className: 'vizag-logo',
    pane: 'vizagPane',
    interactive: false,
    alt: 'Seek Truth — Timpany School'
  }).addTo(map);

  map.attributionControl.addAttribution(
    'Borders &copy; <a href="https://www.naturalearthdata.com/">Natural Earth</a>'
  );

  // ════════════════════════════════════════════════════════════
  // Country borders (Natural Earth 1:110m, via jsDelivr CDN)
  // ════════════════════════════════════════════════════════════
  fetch('https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_110m_admin_0_countries.geojson')
    .then(r => r.json())
    .then(geo => {
      L.geoJSON(geo, {
        style: {
          fillColor: '#ffffff',
          fillOpacity: 1,
          color: '#d8d3c4',
          weight: 0.8
        }
      }).addTo(map);
    })
    .catch(err => console.warn('Could not load country borders', err));

  // ════════════════════════════════════════════════════════════
  // Pin SVG (ball-head pushpin) and cluster donut-pie icon
  // ════════════════════════════════════════════════════════════
  function pinIconForHouse(house) {
    const h    = HOUSES[house] ? house : 'pluto';
    const dark = HOUSES[h].dark;
    const svg =
      '<svg width="24" height="36" viewBox="0 0 24 36" xmlns="http://www.w3.org/2000/svg">' +
      '<polygon points="11,14 13,14 12,35" fill="url(#spike)" stroke="#555" stroke-width="0.3"/>' +
      '<circle cx="12" cy="8.5" r="7.5" fill="url(#' + h + ')" stroke="' + dark + '" stroke-width="0.4"/>' +
      '<ellipse cx="9.8" cy="6" rx="2" ry="1.2" fill="white" opacity="0.55"/>' +
      '</svg>';
    return L.divIcon({
      className:    'city-pin',
      html:         svg,
      iconSize:     [24, 36],
      iconAnchor:   [12, 35],
      popupAnchor:  [0, -34]
    });
  }

  function clusterIconForChildren(children) {
    const counts = { pluto: 0, mercury: 0, jupiter: 0, neptune: 0 };
    for (const m of children) counts[m.options.house || 'pluto']++;
    const total = children.length;
    const present = HOUSE_KEYS.filter(h => counts[h] > 0);

    let svg = '<svg width="40" height="40" viewBox="-20 -20 40 40" xmlns="http://www.w3.org/2000/svg">';
    if (present.length === 1) {
      const h = present[0];
      svg += '<circle cx="0" cy="0" r="16" fill="' + HOUSES[h].mid + '" stroke="' + HOUSES[h].dark + '" stroke-width="0.6"/>';
    } else {
      let a0 = -Math.PI / 2;
      for (const h of HOUSE_KEYS) {
        const c = counts[h];
        if (c === 0) continue;
        const a1 = a0 + (c / total) * Math.PI * 2;
        const x1 = (16 * Math.cos(a0)).toFixed(2);
        const y1 = (16 * Math.sin(a0)).toFixed(2);
        const x2 = (16 * Math.cos(a1)).toFixed(2);
        const y2 = (16 * Math.sin(a1)).toFixed(2);
        const large = (a1 - a0) > Math.PI ? 1 : 0;
        svg += '<path d="M0,0 L' + x1 + ',' + y1 + ' A16,16 0 ' + large + ',1 ' + x2 + ',' + y2 + ' Z" ' +
               'fill="' + HOUSES[h].mid + '" stroke="' + HOUSES[h].dark + '" stroke-width="0.5"/>';
        a0 = a1;
      }
    }
    svg += '<circle cx="0" cy="0" r="9.5" fill="#fff" stroke="#d8d3c4" stroke-width="0.5"/>';
    svg += '<text x="0" y="0.5" text-anchor="middle" dominant-baseline="middle" ' +
           'font-family="Source Sans 3, sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">' + total + '</text>';
    svg += '</svg>';
    return L.divIcon({ html: svg, className: 'house-cluster', iconSize: [40, 40] });
  }

  const clusterGroup = L.markerClusterGroup({
    iconCreateFunction:       (c) => clusterIconForChildren(c.getAllChildMarkers()),
    showCoverageOnHover:      false,
    maxClusterRadius:         50,
    spiderfyDistanceMultiplier: 1.6
  }).addTo(map);

  // ════════════════════════════════════════════════════════════
  // Status banner helpers
  // ════════════════════════════════════════════════════════════
  const banner = document.getElementById('status-banner');
  function setBanner(html, kind /* 'info' | 'error' | null */) {
    banner.innerHTML = html;
    banner.classList.toggle('error', kind === 'error');
    banner.classList.remove('hidden');
  }
  function hideBanner() { banner.classList.add('hidden'); }

  function escapeHtml(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])
    );
  }

  // ════════════════════════════════════════════════════════════
  // Load alumni from Supabase (public_alumni_map view, anon-readable)
  // ════════════════════════════════════════════════════════════
  async function loadAlumni() {
    if (!window.supabase || !window.supabase.from) {
      setBanner('Map data could not load — Supabase client missing.', 'error');
      return;
    }
    setBanner('Loading alumni…');
    try {
      const { data, error } = await window.supabase
        .from('public_alumni_map')
        .select('first_name, last_initial, house, latitude, longitude');

      if (error) throw error;
      if (!data || data.length === 0) {
        setBanner(
          'No Timpots on the map yet. ' +
          '<a href="login.html">Sign up</a> and fill in your profile to be the first pin.',
          'info'
        );
        return;
      }

      const markers = [];
      for (const row of data) {
        if (typeof row.latitude !== 'number' || typeof row.longitude !== 'number') continue;
        const house = HOUSES[row.house] ? row.house : 'pluto';
        const marker = L.marker([row.latitude, row.longitude], {
          icon:  pinIconForHouse(house),
          house: house
        });
        const initial = (row.last_initial || '').toString().slice(0, 1).toUpperCase();
        const name    = escapeHtml(row.first_name || '') + (initial ? ' ' + initial + '.' : '');
        const popupHtml =
          '<strong>' + (name || 'A Timpot') + '</strong>' +
          '<br><em>' + escapeHtml(HOUSES[house].label) + ' house</em>';
        marker.bindPopup(popupHtml);
        markers.push(marker);
      }

      clusterGroup.addLayers(markers);

      // Fit map to all pins (with a small padding)
      if (markers.length > 0) {
        const bounds = L.latLngBounds(markers.map(m => m.getLatLng()));
        map.fitBounds(bounds, { padding: [40, 40], maxZoom: 6 });
      }

      // Compact summary in the banner
      setBanner(markers.length + ' Timpot' + (markers.length === 1 ? '' : 's') + ' on the map');
      setTimeout(hideBanner, 4000);
    } catch (e) {
      console.error('Alumni map load failed', e);
      setBanner('Could not load alumni — try refreshing the page.', 'error');
    }
  }

  // Auth.js listens for this so the masthead user icon reflects sign-in state
  document.addEventListener('DOMContentLoaded', () => {
    document.dispatchEvent(new CustomEvent('sectionsLoaded'));
    loadAlumni();
  });
  if (document.readyState !== 'loading') {
    document.dispatchEvent(new CustomEvent('sectionsLoaded'));
    loadAlumni();
  }
</script>

</body>
</html>
