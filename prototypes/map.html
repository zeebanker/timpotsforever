<html lang="en">
<head>
<meta charset="utf-8">
<title>Timpots Forever — Map Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root {
    --brand: #7a1420;
    --brand-dark: #4a0810;
    --brand-light: #a83040;
    --gold: #b5894a;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-muted: #767676;
    --bg: #ffffff;
    --bg-soft: #f5f2ec;
    --bg-warm: #ebe4d3;
    --rule: #d8d3c4;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: "Source Sans 3", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg-soft);
    color: var(--ink);
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 22px;
    border-bottom: 1px solid var(--rule);
    background: var(--bg);
  }
  header h1 {
    margin: 0 0 6px 0;
    font-family: "Playfair Display", Georgia, serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--brand);
    letter-spacing: 0.3px;
  }
  header p {
    margin: 0;
    font-size: 13px;
    color: var(--ink-muted);
  }
  .form-row {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .autocomplete-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  input[type="text"] {
    width: 100%;
    padding: 8px 10px;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    border: 1px solid var(--rule);
    border-radius: 3px;
    background: var(--bg);
  }
  input[type="text"]:focus {
    outline: none;
    border-color: var(--brand);
    box-shadow: 0 0 0 2px rgba(122, 20, 32, 0.08);
  }
  .suggestions {
    position: absolute;
    top: calc(100% + 2px);
    left: 0;
    right: 0;
    z-index: 1000;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 3px;
    margin: 0;
    padding: 0;
    list-style: none;
    max-height: 280px;
    overflow-y: auto;
    box-shadow: 0 4px 14px rgba(26, 10, 13, 0.15);
  }
  .suggestions li {
    padding: 8px 12px;
    cursor: pointer;
    font-size: 14px;
    border-bottom: 1px solid var(--rule);
    color: var(--ink-soft);
  }
  .suggestions li:last-child { border-bottom: none; }
  .suggestions li:hover,
  .suggestions li.active {
    background: var(--bg-warm);
    color: var(--brand);
  }
  .suggestions li .primary {
    font-weight: 600;
    color: var(--ink);
  }
  .suggestions li.active .primary,
  .suggestions li:hover .primary { color: var(--brand); }
  .suggestions li .sub {
    display: block;
    font-size: 12px;
    color: var(--ink-muted);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  button {
    padding: 8px 16px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    background: var(--brand);
    color: #fff;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    letter-spacing: 0.3px;
  }
  button:hover { background: var(--brand-dark); }
  button:disabled { opacity: 0.5; cursor: wait; }
  .status {
    font-size: 13px;
    color: var(--ink-muted);
    min-height: 18px;
    margin-top: 6px;
  }
  .status.error { color: var(--brand); }
  main {
    flex: 1;
    display: flex;
    min-height: 0;
  }
  #map {
    flex: 1;
    min-height: 300px;
    background: var(--bg-soft);
  }
  aside {
    width: 270px;
    border-left: 1px solid var(--rule);
    background: var(--bg-warm);
    overflow-y: auto;
    padding: 14px 16px;
  }
  aside h2 {
    margin: 0 0 10px 0;
    font-family: "Playfair Display", Georgia, serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--brand);
  }
  ul#pin-list {
    list-style: none;
    margin: 0;
    padding: 0;
  }
  ul#pin-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid var(--rule);
    font-size: 14px;
    color: var(--ink-soft);
  }
  ul#pin-list li button {
    background: none;
    color: var(--ink-muted);
    padding: 2px 6px;
    font-size: 18px;
    line-height: 1;
    font-weight: 400;
  }
  ul#pin-list li button:hover {
    color: var(--brand);
    background: none;
  }
  ul#pin-list li .city-name {
    cursor: pointer;
  }
  ul#pin-list li .city-name:hover { color: var(--brand); }
  .empty {
    font-size: 13px;
    color: var(--ink-muted);
    font-style: italic;
  }

  .house-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    font-size: 14px;
    color: var(--ink-soft);
  }
  .house-row select {
    padding: 6px 8px;
    font-family: inherit;
    font-size: 14px;
    border: 1px solid var(--rule);
    border-radius: 3px;
    background: var(--bg);
    color: var(--ink);
    cursor: pointer;
  }
  .house-swatch {
    display: inline-block;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.15);
    box-shadow: inset 1px 1px 2px rgba(255,255,255,0.4);
  }
  .house-cluster { background: transparent; border: none; }
  .demo-row {
    margin-top: 6px;
    font-size: 13px;
    color: var(--ink-soft);
  }
  .demo-row label { cursor: pointer; user-select: none; }
  .demo-row input { margin-right: 6px; vertical-align: middle; }
  .city-pin { background: transparent; border: none; }
  .vizag-logo { filter: url(#garnet-tint); }
  /* Garnet popup styling for Leaflet */
  .leaflet-popup-content-wrapper {
    border-radius: 3px;
    border-top: 3px solid var(--gold);
  }
  .leaflet-popup-content { font-family: "Source Sans 3", sans-serif; color: var(--ink); }
  .leaflet-popup-content strong { color: var(--brand); font-family: "Playfair Display", Georgia, serif; }
  @media (max-width: 700px) {
    main { flex-direction: column; }
    aside { width: 100%; border-left: none; border-top: 1px solid var(--rule); max-height: 200px; }
  }
</style>
</head>
<body>
<svg style="position:absolute;width:0;height:0;" aria-hidden="true">
  <defs>
    <filter id="garnet-tint">
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.478
                0 0 0 0 0.078
                0 0 0 0 0.125
                0 0 0 1 0"/>
    </filter>
    <radialGradient id="pluto" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#e8a8b0"/>
      <stop offset="40%" stop-color="#a83040"/>
      <stop offset="100%" stop-color="#3a0810"/>
    </radialGradient>
    <radialGradient id="mercury" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f0e4a8"/>
      <stop offset="40%" stop-color="#d4a017"/>
      <stop offset="100%" stop-color="#7a5328"/>
    </radialGradient>
    <radialGradient id="jupiter" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#a8c5e8"/>
      <stop offset="40%" stop-color="#2f5a9e"/>
      <stop offset="100%" stop-color="#0a2548"/>
    </radialGradient>
    <radialGradient id="neptune" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#a8d8b8"/>
      <stop offset="40%" stop-color="#2d7a3f"/>
      <stop offset="100%" stop-color="#0a3a18"/>
    </radialGradient>
    <linearGradient id="spike" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#dadada"/>
      <stop offset="50%" stop-color="#a8a8a8"/>
      <stop offset="100%" stop-color="#666666"/>
    </linearGradient>
  </defs>
</svg>

<header>
  <h1>Map Prototype</h1>
  <p>Type a city and add a pin. Pins are saved in your browser.</p>
  <div class="house-row">
    <label for="house-select">My house:</label>
    <select id="house-select">
      <option value="pluto">Pluto / Venus</option>
      <option value="mercury">Mercury</option>
      <option value="jupiter">Jupiter</option>
      <option value="neptune">Neptune</option>
    </select>
    <span class="house-swatch" id="house-swatch"></span>
  </div>
  <div class="demo-row">
    <label><input type="checkbox" id="show-mock" checked> Show 500 mock alumni (demo)</label>
  </div>
  <div class="form-row">
    <div class="autocomplete-wrap">
      <input id="city-input" type="text" placeholder="Start typing a city…" autocomplete="off" spellcheck="false">
      <ul id="suggestions" class="suggestions" hidden></ul>
    </div>
    <button id="add-btn">Add pin</button>
  </div>
  <div id="status" class="status"></div>
</header>

<main>
  <div id="map"></div>
  <aside>
    <h2>Pinned cities</h2>
    <ul id="pin-list"></ul>
    <p id="empty-msg" class="empty">No pins yet.</p>

  function fakeName() {
    return FAKE_FIRST[Math.floor(Math.random() * FAKE_FIRST.length)] + ' ' +
           FAKE_LAST[Math.floor(Math.random() * FAKE_LAST.length)];
  }

  // Build a donut-pie cluster icon: outer ring colored by house proportions, count in center
  function clusterIconForChildren(children) {
    const counts = { pluto: 0, mercury: 0, jupiter: 0, neptune: 0 };
    for (const m of children) {
      counts[m.options.house || 'pluto']++;
    }
    const total = children.length;
    const present = HOUSE_KEYS.filter(h => counts[h] > 0);
    let svg = '<svg width="40" height="40" viewBox="-20 -20 40 40" xmlns="http://www.w3.org/2000/svg">';
    if (present.length === 1) {
      const h = present[0];
      svg += '<circle cx="0" cy="0" r="16" fill="' + HOUSES[h].mid + '" stroke="' + HOUSES[h].dark + '" stroke-width="0.6"/>';
    } else {
      let a0 = -Math.PI / 2;
      for (const h of HOUSE_KEYS) {
        const c = counts[h];
        if (c === 0) continue;
        const a1 = a0 + (c / total) * Math.PI * 2;
        const x1 = (16 * Math.cos(a0)).toFixed(2);
        const y1 = (16 * Math.sin(a0)).toFixed(2);
        const x2 = (16 * Math.cos(a1)).toFixed(2);
        const y2 = (16 * Math.sin(a1)).toFixed(2);
        const large = (a1 - a0) > Math.PI ? 1 : 0;
        svg += '<path d="M0,0 L' + x1 + ',' + y1 + ' A16,16 0 ' + large + ',1 ' + x2 + ',' + y2 + ' Z" fill="' + HOUSES[h].mid + '" stroke="' + HOUSES[h].dark + '" stroke-width="0.5"/>';
        a0 = a1;
      }
    }
    svg += '<circle cx="0" cy="0" r="9.5" fill="#fff" stroke="#d8d3c4" stroke-width="0.5"/>';
    svg += '<text x="0" y="0.5" text-anchor="middle" dominant-baseline="middle" font-family="Source Sans 3, sans-serif" font-size="11" font-weight="700" fill="#1a1a1a">' + total + '</text>';
    svg += '</svg>';
    return L.divIcon({
      html: svg,
      className: 'house-cluster',
      iconSize: [40, 40]
    });
  }

  const clusterGroup = L.markerClusterGroup({
    iconCreateFunction: (c) => clusterIconForChildren(c.getAllChildMarkers()),
    showCoverageOnHover: false,
    maxClusterRadius: 50,
    spiderfyDistanceMultiplier: 1.6
  }).addTo(map);

  let mockMarkers = [];
  function buildMockMarkers() {
    const out = [];
    for (const c of MOCK_CITIES) {
      for (let i = 0; i < c.count; i++) {
        const house = HOUSE_KEYS[Math.floor(Math.random() * 4)];
        const name = fakeName();
        const m = L.marker([c.lat, c.lon], {
          icon: pinIconForHouse(house),
          house: house
        });
        m.bindPopup('<strong>' + escapeHtml(name) + '</strong><br>' + escapeHtml(c.name) + '<br><em>' + HOUSES[house].label + '</em>');
        out.push(m);
      }
    }
    return out;
  }
  function showMockAlumni(show) {
    if (show) {
      if (mockMarkers.length === 0) mockMarkers = buildMockMarkers();
      clusterGroup.addLayers(mockMarkers);
    } else {
      clusterGroup.removeLayers(mockMarkers);
    }
  }

  function addMarker(pin) {
    const house = HOUSES[pin.house] ? pin.house : 'pluto';
    pin.house = house;
    const marker = L.marker([pin.lat, pin.lon], { icon: pinIconForHouse(house), house: house });
    marker.bindPopup(`<strong>${escapeHtml(pin.name)}</strong>`);
    pin.marker = marker;
    clusterGroup.addLayer(marker);
    return marker;
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function renderList() {
    listEl.innerHTML = '';
    if (pins.length === 0) {
      emptyMsg.style.display = 'block';
      return;
    }
    emptyMsg.style.display = 'none';
    pins.forEach((pin, idx) => {
      const li = document.createElement('li');
      const nameSpan = document.createElement('span');
      nameSpan.className = 'city-name';
      nameSpan.textContent = pin.name;
      nameSpan.title = 'Pan to this pin';
      nameSpan.addEventListener('click', () => {
        map.setView([pin.lat, pin.lon], 9);
        pin.marker.openPopup();
      });
      const rm = document.createElement('button');
      rm.textContent = '×';
      rm.title = 'Remove pin';
      rm.addEventListener('click', () => removePin(idx));
      li.appendChild(nameSpan);
      li.appendChild(rm);
      listEl.appendChild(li);
    });
  }

  function fitToPins() {
    if (pins.length === 0) return;
    if (pins.length === 1) {
      map.setView([pins[0].lat, pins[0].lon], 8);
      return;
    }
    const bounds = L.latLngBounds(pins.map(p => [p.lat, p.lon]));
    map.fitBounds(bounds, { padding: [40, 40] });
  }

  async function geocode(city) {
    const url = 'https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(city);
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) throw new Error('Geocoding service error');
    const data = await res.json();
    if (!data || data.length === 0) throw new Error('No matches found');
    return {
      lat: parseFloat(data[0].lat),
      lon: parseFloat(data[0].lon),
      displayName: data[0].display_name
    };
  }

  async function addPin(rawCity) {
    const city = rawCity.trim();
    if (!city) return;
    if (pins.some(p => p.name.toLowerCase() === city.toLowerCase())) {
      setStatus(`"${city}" is already pinned.`, true);
      return;
    }
    setStatus(`Looking up "${city}"…`);
    addBtn.disabled = true;
    try {
      const { lat, lon } = await geocode(city);
      const pin = { name: city, lat, lon, house: currentHouse };
      addMarker(pin);
      pins.push(pin);
      savePins();
      renderList();
      map.setView([lat, lon], 8);
      pin.marker.openPopup();
      setStatus(`Added "${city}".`);
      input.value = '';
    } catch (err) {
      setStatus(`Couldn't find "${city}": ${err.message}`, true);
    } finally {
      addBtn.disabled = false;
      input.focus();
    }
  }

  function removePin(idx) {
    const pin = pins[idx];
    if (!pin) return;
    clusterGroup.removeLayer(pin.marker);
    pins.splice(idx, 1);
    savePins();
    renderList();
  }

  // Restore pins from localStorage
  (function init() {
    const stored = loadPins();
    stored.forEach(p => {
      const pin = { name: p.name, lat: p.lat, lon: p.lon, house: p.house };
      addMarker(pin);
      pins.push(pin);
    });
    renderList();
    fitToPins();
  })();

  function shortLabel(item) {
    const a = item.address || {};
    const primary = a.city || a.town || a.village || a.hamlet || a.municipality ||
                    a.suburb || a.county || item.name ||
                    (item.display_name ? item.display_name.split(',')[0] : '');
    const secondary = a.state || a.region || null;
    const tertiary = a.country || null;
    return [primary, secondary, tertiary].filter(Boolean).join(', ');
  }

  function hideSuggestions() {
    suggestionsEl.hidden = true;
    suggestionsEl.innerHTML = '';
    suggestions = [];
    activeIdx = -1;
  }

  function renderSuggestions() {
    suggestionsEl.innerHTML = '';
    if (suggestions.length === 0) { hideSuggestions(); return; }
    suggestions.forEach((s, i) => {
      const li = document.createElement('li');
      if (i === activeIdx) li.classList.add('active');
      const primary = document.createElement('div');
      primary.className = 'primary';
      primary.textContent = shortLabel(s);
      const sub = document.createElement('span');
      sub.className = 'sub';
      sub.textContent = s.display_name || '';
      li.appendChild(primary);
      li.appendChild(sub);
      li.addEventListener('mousedown', (e) => {
        e.preventDefault();
        selectSuggestion(i);
      });
      li.addEventListener('mouseenter', () => {
        activeIdx = i;
        Array.from(suggestionsEl.children).forEach((c, idx) =>
          c.classList.toggle('active', idx === activeIdx));
      });
      suggestionsEl.appendChild(li);
    });
    suggestionsEl.hidden = false;
  }

  async function fetchSuggestions(q) {
    if (abortCtrl) abortCtrl.abort();
    abortCtrl = new AbortController();
    const url = 'https://nominatim.openstreetmap.org/search?format=json' +
                '&addressdetails=1&limit=6&featuretype=settlement&q=' + encodeURIComponent(q);
    try {
      const res = await fetch(url, {
        signal: abortCtrl.signal,
        headers: { 'Accept': 'application/json' }
      });
      if (!res.ok) return [];
      return await res.json();
    } catch (e) {
      if (e.name === 'AbortError') return null;
      return [];
    }
  }

  function selectSuggestion(i) {
    const s = suggestions[i];
    if (!s) return;
    const name = shortLabel(s);
    const lat = parseFloat(s.lat);
    const lon = parseFloat(s.lon);
    hideSuggestions();
    addPinDirect(name, lat, lon);
  }

  function addPinDirect(name, lat, lon) {
    if (pins.some(p => p.name.toLowerCase() === name.toLowerCase())) {
      setStatus(`"${name}" is already pinned.`, true);
      return;
    }
    const pin = { name, lat, lon, house: currentHouse };
    addMarker(pin);
    pins.push(pin);
    savePins();
    renderList();
    map.setView([lat, lon], 8);
    pin.marker.openPopup();
    setStatus(`Added "${name}".`);
    input.value = '';
    lastQuery = '';
  }

  addBtn.addEventListener('click', () => {
    if (activeIdx >= 0 && suggestions[activeIdx]) selectSuggestion(activeIdx);
    else addPin(input.value);
  });

  input.addEventListener('input', () => {
    const q = input.value.trim();
    clearTimeout(debounceTimer);
    if (q.length < 2) { hideSuggestions(); return; }
    debounceTimer = setTimeout(async () => {
      if (q === lastQuery) return;
      lastQuery = q;
      const results = await fetchSuggestions(q);
      if (results === null) return;
      suggestions = results || [];
      activeIdx = -1;
      renderSuggestions();
    }, 300);
  });

  input.addEventListener('keydown', (e) => {
    const open = !suggestionsEl.hidden && suggestions.length > 0;
    if (e.key === 'ArrowDown' && open) {
      e.preventDefault();
      activeIdx = (activeIdx + 1) % suggestions.length;
      renderSuggestions();
    } else if (e.key === 'ArrowUp' && open) {
      e.preventDefault();
      activeIdx = activeIdx <= 0 ? suggestions.length - 1 : activeIdx - 1;
      renderSuggestions();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (open && activeIdx >= 0) selectSuggestion(activeIdx);
      else addPin(input.value);
    } else if (e.key === 'Escape') {
      hideSuggestions();
    }
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.autocomplete-wrap')) hideSuggestions();
  });

  // ===== House dropdown =====
  const houseSelect = document.getElementById('house-select');
  const houseSwatch = document.getElementById('house-swatch');
  function updateHouseSwatch() {
    houseSwatch.style.background = HOUSES[currentHouse].mid;
  }
  houseSelect.value = currentHouse;
  updateHouseSwatch();
  houseSelect.addEventListener('change', () => {
    currentHouse = houseSelect.value;
    localStorage.setItem(HOUSE_KEY, currentHouse);
    updateHouseSwatch();
  });

  // ===== Mock alumni toggle =====
  const mockCheckbox = document.getElementById('show-mock');
  showMockAlumni(mockCheckbox.checked);
  mockCheckbox.addEventListener('change', (e) => showMockAlumni(e.target.checked));

  input.focus();
</script>
